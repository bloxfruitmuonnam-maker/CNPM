<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshKeep - Hệ thống Giám sát & Quản lý Tủ lạnh Thông minh</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- STYLING LAYER -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/chatbot.css">
    
    <!-- React & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
</head>
<body>

    <!-- React App Mount Point -->
    <div id="root"></div>

    <!-- Vanilla JS Chatbot Widget -->
    <div id="freshkeep-orange-ai-chatbot">
        <button id="orange-ai-btn">
            <div class="chatbot-btn-container">
                <span class="pulse-ring"></span>
                <span id="orange-emoji">🍊</span>
                <span class="online-badge"></span>
            </div>
        </button>

        <div id="orange-ai-chatbox">
            <div class="chat-header">
                <div class="chat-status">
                    <span class="status-dot"></span>
                    <span class="status-text">FRESHKEEP SUPER AI 🍊</span>
                </div>
                <button id="close-chat-btn">&times;</button>
            </div>

            <div id="chat-messages">
                <div class="message-ai">
                    Chào bạn! Tôi là <strong>Siêu Trợ Lý Tủ Lạnh FreshKeep 🍊</strong>. Hãy thử hỏi tôi về các món ăn tối nay hoặc thực phẩm sắp hết hạn trong tủ lạnh nhé!
                </div>
            </div>

            <div id="quick-actions">
                <button class="quick-chip" data-msg="Gợi ý món ăn tối nay từ tủ lạnh">🍳 Gợi ý món tối nay</button>
                <button class="quick-chip" data-msg="Kiểm tra thực phẩm sắp hết hạn">🚨 Thực phẩm hết hạn</button>
                <button class="quick-chip" data-msg="Lập thực đơn giảm cân 1500 kcal">🥗 Thực đơn giảm cân</button>
            </div>

            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Hỏi AI FreshKeep về tủ lạnh của bạn..." autocomplete="off" required>
                <button type="submit" id="chat-submit-btn">Gửi</button>
            </form>
        </div>
    </div>

    <!-- TẢI CẤU HÌNH & DỮ LIỆU -->
    <script type="text/babel" src="config/database.js" defer></script>
    
    <!-- TẢI CÁC DỊCH VỤ DỰNG SẴN (CORE SERVICES) -->
    <script type="text/babel" src="services/notificationService.js" defer></script>
    <script type="text/babel" src="services/expiryService.js" defer></script>
    <script type="text/babel" src="services/recipeService.js" defer></script>
    <script type="text/babel" src="services/nlpParser.js" defer></script>
    
    <!-- TẢI THÀNH PHẦN GIAO DIỆN (UI COMPONENTS) -->
    <script type="text/babel" src="components/FoodPlateIcon.js" defer></script>
    <script type="text/babel" src="components/FridgeVisual.js" defer></script>
    
    <!-- TẢI ĐIỀU KHIỂN CHÍNH & KHỞI CHẠY REACT -->
    <script type="text/babel" src="app.js" defer></script>
    
    <!-- KHỞI CHẠY CHATBOT WIDGET -->
    <script src="chatbot.js" defer></script>
</body>
</html>
