<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FreshKeep - Test Widget</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:#fffaf0; padding:20px; color:#0f172a; }
    h1{font-size:20px;margin-bottom:6px}
    .container{max-width:980px;margin:0 auto}
    .card{background:#fff;border-radius:12px;padding:12px;margin-bottom:14px;box-shadow:0 6px 20px rgba(2,6,23,0.06);border:1px solid rgba(2,6,23,0.04)}
    .list{display:flex;flex-wrap:wrap;gap:8px}
    .item{background:#f8fafc;padding:8px;border-radius:8px;font-size:13px;border:1px solid rgba(2,6,23,0.04)}
    /* Orange chat button & mini chat panel */
    .orange-chat-button {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 64px;
      height: 64px;
      border-radius: 9999px;
      background: radial-gradient(circle at 30% 30%, #ffb347 0%, #ff7e00 60%);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index: 2000;
      border: 3px solid rgba(255,255,255,0.6);
      transition: transform .15s;
    }
    .orange-chat-button:hover { transform: translateY(-3px) scale(1.03); }

    .mini-chat-panel {
      position: fixed;
      right: 20px;
      bottom: 100px;
      width: 360px;
      max-height: 70vh;
      background: rgba(255,255,255,0.98);
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.35);
      overflow: hidden;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      font-family: inherit;
      border: 1px solid rgba(15,23,42,0.06);
    }

    .mini-chat-header {
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      background: linear-gradient(90deg,#ff9a3d 0%, #ff6a00 100%);
      color: white;
      font-weight:700;
    }

    .mini-chat-body {
      padding: 10px;
      overflow: auto;
      flex: 1 1 auto;
      font-size: 13px;
    }

    .mini-chat-body .msg {
      margin-bottom: 8px;
      display:block;
      white-space:pre-wrap;
    }

    .mini-chat-body .msg.ai { color: #0f172a; background: #f8fafc; padding:8px; border-radius: 8px; }
    .mini-chat-body .msg.user { color: white; background: #ff7e00; padding:8px; border-radius: 8px; text-align: right; }

    .mini-chat-input {
      padding: 10px;
      display:flex;
      gap:8px;
      align-items:center;
      border-top: 1px solid rgba(0,0,0,0.04);
      background: #fff;
    }

    .mini-chat-input input[type="text"] {
      flex:1;
      padding:8px 10px;
      border-radius: 8px;
      border:1px solid rgba(15,23,42,0.06);
      font-size:13px;
    }
    .mini-chat-input button {
      background:#ff7e00;
      color:white;
      border:none;
      padding:8px 10px;
      border-radius:8px;
      cursor:pointer;
    }
    .mini-chat-actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .mini-chat-actions button { background:#fff; border:1px solid rgba(15,23,42,0.06); padding:6px 8px; border-radius:8px; cursor:pointer; font-size:12px; }
    small.hint { display:block;color:#475569;margin-top:6px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>FreshKeep - Test Widget (Standalone)</h1>
    <div class="card">
      <strong>Nguyên liệu trong tủ (mock):</strong>
      <div id="items" class="list" style="margin-top:8px"></div>
      <small class="hint">Bạn có thể xóa / thêm bằng form bên dưới để test.</small>
      <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
        <input id="addName" placeholder="Tên (ví dụ: Thịt bò Mỹ)" style="padding:8px;border-radius:8px;border:1px solid #e6e9ef;flex:1"/>
        <input id="addQty" placeholder="Số lượng" style="padding:8px;border-radius:8px;border:1px solid #e6e9ef;width:120px"/>
        <button id="addBtn" style="padding:8px 12px;border-radius:8px;background:#0ea5a2;color:#fff;border:none">Thêm</button>
      </div>
    </div>

    <div class="card">
      <strong>Ghi chú:</strong>
      <div style="margin-top:8px">Widget chat sẽ ưu tiên món sắp hết hạn (<= 3 ngày). Calorie là ước tính sơ bộ từ bảng CalorieDB mặc định.</div>
    </div>
  </div>

  <!-- Orange button -->
  <button class="orange-chat-button" aria-label="FreshKeep AI chat" id="fk-btn">🍊</button>

  <!-- Chat panel (inserted by script) -->
  <div id="fk-panel-root"></div>

  <script>
    // -------------------------
    // Mock data (same structure)
    // -------------------------
    const initialFoodItems = [
      { id: '1', name: 'Sữa tươi TH True Milk', quantity: '2 hộp 1L', category: 'Sữa & Đồ hộp', compartment: 'Cánh tủ', expiryDate: new Date(Date.now() + 6 * 24*3600*1000).toISOString().split('T')[0] },
      { id: '2', name: 'Thịt bò Mỹ phi lê', quantity: '500g', category: 'Thịt & Hải sản', compartment: 'Ngăn đông', expiryDate: new Date(Date.now() + 15 * 24*3600*1000).toISOString().split('T')[0] },
      { id: '3', name: 'Ức gà phi lê', quantity: '1kg', category: 'Thịt & Hải sản', compartment: 'Ngăn đông', expiryDate: new Date(Date.now() + 2 * 24*3600*1000).toISOString().split('T')[0] },
      { id: '4', name: 'Ớt chuông đỏ', quantity: '3 quả', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', expiryDate: new Date(Date.now() + 1 * 24*3600*1000).toISOString().split('T')[0] },
      { id: '5', name: 'Sữa bột ăn dặm cho bé', quantity: '1 hộp', category: 'Sữa & Đồ hộp', compartment: 'Ngăn đồ ăn dặm', expiryDate: new Date(Date.now() + 1 * 24*3600*1000).toISOString().split('T')[0] },
      { id: '6', name: 'Hành tây', quantity: '2 củ', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', expiryDate: new Date(Date.now() + 8 * 24*3600*1000).toISOString().split('T')[0] },
      { id: '7', name: 'Bông cải xanh', quantity: '1 cây', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', expiryDate: new Date(Date.now() + 1 * 24*3600*1000).toISOString().split('T')[0] }
    ];

    // Simple UI state
    let items = initialFoodItems.map(i => ({...i}));

    function renderItems(){
      const wrap = document.getElementById('items');
      wrap.innerHTML = '';
      items.forEach(it => {
        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = `<strong>${it.name}</strong><div style="font-size:12px;margin-top:4px">${it.quantity} • ${it.compartment} • Hạn: ${it.expiryDate} <button data-id="${it.id}" style="margin-left:8px;color:#ef4444;border:none;background:transparent;cursor:pointer">Xóa</button></div>`;
        wrap.appendChild(el);
      });
      // attach delete handlers
      wrap.querySelectorAll('button[data-id]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const id = btn.getAttribute('data-id');
          items = items.filter(x=>x.id!==id);
          renderItems();
        });
      });
    }
    renderItems();

    document.getElementById('addBtn').addEventListener('click', ()=>{
      const n = document.getElementById('addName').value.trim();
      const q = document.getElementById('addQty').value.trim() || '1 phần';
      if(!n) return alert('Nhập tên nguyên liệu');
      const newid = Date.now().toString();
      // default expiry 7 ngày nếu không set
      const expiry = new Date(Date.now() + 7*24*3600*1000).toISOString().split('T')[0];
      items.unshift({id:newid, name:n, quantity:q, category:'Khác', compartment:'Ngăn mát', expiryDate: expiry});
      document.getElementById('addName').value=''; document.getElementById('addQty').value='';
      renderItems();
    });

    // Expose getter so widget reads the live items array
    window.getFreshItems = () => items;

    // -------------------------
    // ExpiryEngine (same logic)
    // -------------------------
    const ExpiryEngine = {
      calculate: (item, warnDaysLimit = 3, pediatricWarnLimit = 2) => {
        const today = new Date(); today.setHours(0,0,0,0);
        const expiry = new Date(item.expiryDate); expiry.setHours(0,0,0,0);
        const diffTime = expiry.getTime() - today.getTime();
        const daysRemaining = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        if (daysRemaining < 0) {
          return { label: 'ĐÃ HẾT HẠN 🔴', daysRemaining, isPulse:true };
        }
        if ((item.isPediatricCritical || item.compartment === 'Ngăn đồ ăn dặm') && daysRemaining <= pediatricWarnLimit) {
          return { label: `NGUY HIỂM: ĐỒ CỦA BÉ (${daysRemaining} ngày) 👶🚨`, daysRemaining, isPulse:true };
        }
        if (daysRemaining <= warnDaysLimit) {
          return { label: `SẮP HẾT HẠN (${daysRemaining} ngày) 🟡`, daysRemaining, isPulse:true };
        }
        return { label: 'TƯƠI MỚI 🟢', daysRemaining, isPulse:false };
      }
    };

    // -------------------------
    // RecipeCatalog (subset)
    // -------------------------
    const RecipeCatalog = [
      { name: 'Gà xào ớt chuông và hành tây', requiredIngredients: ['gà','ớt chuông','hành tây'], desc: 'Gà xào ớt chuông và hành tây' },
      { name: 'Bò lúc lắc', requiredIngredients: ['bò','hành tây','ớt chuông'], desc: 'Bò lúc lắc thơm ngon' },
      { name: 'Hải sản xào thập cẩm', requiredIngredients: ['mực','tôm','bông cải','cà rốt'], desc: 'Hải sản xào thập cẩm' },
      { name: 'Trứng cuộn phô mai', requiredIngredients: ['trứng','phô mai','bơ'], desc: 'Trứng cuộn phô mai béo ngậy' },
      { name: 'Cơm chiên Dương Châu', requiredIngredients: ['trứng','cơm','xúc xích'], desc: 'Cơm chiên cơ bản' }
    ];

    // -------------------------
    // CalorieDB & helpers
    // -------------------------
    const CalorieDB = {
      'gà': 165, 'bò': 250, 'thịt bò':250, 'thịt heo':242, 'cá hồi':208, 'tôm':99,
      'ức gà':165, 'bông cải':34, 'hành tây':40, 'ớt chuông':31, 'khoai tây':77,
      'cà rốt':41, 'trứng':78, 'cơm':130, 'xúc xích':300, 'bơ':717, 'phô mai':350,
      '__default': 100
    };

    function computeRecipeCalories(recipe) {
      let total = 0;
      recipe.requiredIngredients.forEach(ing => {
        const key = Object.keys(CalorieDB).find(k => ing.toLowerCase().includes(k));
        total += (key ? CalorieDB[key] : CalorieDB['__default']);
      });
      return Math.round(total);
    }

    // -------------------------
    // FoodAI (generate menus)
    // -------------------------
    const FoodAI = {
      generateMenus: function(items, options = { prioritizeExpiring: true, mode: 'balanced', warnDaysLimit:3 }) {
        const availableNames = items.map(i => i.name.toLowerCase());
        const criticalNames = items.filter(i => ExpiryEngine.calculate(i, options.warnDaysLimit, 2).daysRemaining <= options.warnDaysLimit)
                                   .map(i => i.name.toLowerCase());
        const scored = RecipeCatalog.map(recipe => {
          let matchCount = 0; let criticalCount = 0;
          recipe.requiredIngredients.forEach(req => {
            const has = availableNames.some(a => a.includes(req));
            if (has) { matchCount++; if (criticalNames.some(c=>c.includes(req))) criticalCount++; }
          });
          const matchScore = matchCount / recipe.requiredIngredients.length;
          const calories = computeRecipeCalories(recipe);
          return { recipe, matchScore, criticalCount, calories };
        });
        let candidates = scored.filter(s => s.matchScore >= 0.33);
        if (options.prioritizeExpiring) {
          candidates.sort((a,b)=> (b.criticalCount - a.criticalCount) || (b.matchScore - a.matchScore));
        } else candidates.sort((a,b)=> b.matchScore - a.matchScore);
        if (options.mode === 'lose') candidates = candidates.filter(c => c.calories <= 650);
        if (options.mode === 'gain') candidates = candidates.filter(c => c.calories >= 650);
        const suggestions = candidates.slice(0,12).map(c => ({
          title: c.recipe.name,
          ingredientsMatched: c.recipe.requiredIngredients.filter(req => availableNames.some(a=>a.includes(req))),
          missingIngredients: c.recipe.requiredIngredients.filter(req => !availableNames.some(a=>a.includes(req))),
          calories: c.calories,
          desc: c.recipe.desc
        }));
        return { generatedAt: new Date().toISOString(), suggestions };
      },
      analyzePantry: function(items, warnDays=3) {
        const soon = items.map(i=>({...i, daysRemaining: ExpiryEngine.calculate(i).daysRemaining}))
                          .filter(i=>i.daysRemaining<=warnDays)
                          .sort((a,b)=>a.daysRemaining-b.daysRemaining);
        return { totalItems: items.length, expiringSoon: soon.length, soonList: soon };
      }
    };

    // -------------------------
    // Widget UI logic
    // -------------------------
    (function(){
      const root = document.getElementById('fk-panel-root');
      const panel = document.createElement('div');
      panel.className = 'mini-chat-panel';
      panel.style.display = 'none';
      panel.innerHTML = `
        <div class="mini-chat-header">
          <div style="font-weight:800">FreshKeep AI</div>
          <div style="margin-left:auto;font-size:12px;opacity:.95">Phân tích & Thực đơn</div>
        </div>
        <div class="mini-chat-body" id="fk-mini-body"></div>
        <div style="padding:10px">
          <div class="mini-chat-actions">
            <button id="fk-suggest">Gợi ý thực đơn</button>
            <button id="fk-lose">Giảm cân</button>
            <button id="fk-gain">Tăng cân</button>
            <button id="fk-analyze">Phân tích sắp hết</button>
          </div>
          <div class="mini-chat-input">
            <input id="fk-input" type="text" placeholder="Hỏi Fridgy (ví dụ: 'Gợi ý bữa tối cho 2 người')"/>
            <button id="fk-send">Gửi</button>
          </div>
        </div>
      `;
      root.appendChild(panel);
      const bodyEl = panel.querySelector('#fk-mini-body');
      const input = panel.querySelector('#fk-input');

      function appendMsg(text, cls='ai') {
        const el = document.createElement('div');
        el.className = 'msg ' + (cls === 'user' ? 'user' : 'ai');
        el.textContent = text;
        bodyEl.appendChild(el);
        bodyEl.scrollTop = bodyEl.scrollHeight;
      }

      function getItems(){ return window.getFreshItems ? window.getFreshItems() : [];}

      function showMenu(mode){
        const its = getItems();
        appendMsg('Đang sinh thực đơn...', 'ai');
        const res = FoodAI.generateMenus(its, { prioritizeExpiring:true, mode:mode, warnDaysLimit:3 });
        if(!res.suggestions || res.suggestions.length === 0) {
          appendMsg('Không tìm thấy thực đơn phù hợp với nguyên liệu hiện có.', 'ai');
          return;
        }
        res.suggestions.forEach(s=>{
          appendMsg(`${s.title} — ~${s.calories} kcal\nNguyên liệu có: ${s.ingredientsMatched.join(', ')}${s.missingIngredients.length ? `\nThiếu: ${s.missingIngredients.join(', ')}` : ''}`, 'ai');
        });
      }

      function analyzePantry(){
        const its = getItems();
        const summary = FoodAI.analyzePantry(its,3);
        appendMsg(`Tổng: ${summary.totalItems} món. Có ${summary.expiringSoon} món sắp hết hạn: ${summary.soonList.map(i=>i.name+' ('+i.daysRemaining+'d)').join(', ')}`, 'ai');
      }

      // handlers
      document.getElementById('fk-btn').addEventListener('click', ()=> {
        panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
      });
      panel.querySelector('#fk-suggest').addEventListener('click', ()=> showMenu('balanced'));
      panel.querySelector('#fk-lose').addEventListener('click', ()=> showMenu('lose'));
      panel.querySelector('#fk-gain').addEventListener('click', ()=> showMenu('gain'));
      panel.querySelector('#fk-analyze').addEventListener('click', analyzePantry);

      panel.querySelector('#fk-send').addEventListener('click', ()=>{
        const txt = input.value.trim();
        if(!txt) return;
        appendMsg(txt,'user');
        const low = txt.toLowerCase();
        if(low.includes('giảm')) showMenu('lose');
        else if(low.includes('tăng')) showMenu('gain');
        else if(low.includes('sắp hết') || low.includes('hết hạn')) analyzePantry();
        else showMenu('balanced');
        input.value='';
      });

      window.addEventListener('keydown', (e)=> {
        if(e.key==='Escape' && panel.style.display !== 'none') panel.style.display='none';
      });

      // greeting
      setTimeout(()=> appendMsg('Xin chào! Bấm "Gợi ý thực đơn" để b���t đầu. Widget ưu tiên món sắp hết hạn và ước tính kcal sơ bộ.'), 250);
    })();
  </script>
</body>
</html>
