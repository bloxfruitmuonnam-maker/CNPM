<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshKeep - Hệ thống Giám sát & Quản lý Tủ lạnh Thông minh</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <link rel="stylesheet" href="phong_cach.css">
</head>
<body>

    <div id="root"></div>

    <!-- START: FRESHKEEP ORANGE AI CHATBOT INTEGRATION -->
    <div id="freshkeep-orange-ai-chatbot" style="font-family: system-ui, -apple-system, sans-serif; position: relative; z-index: 99999;">
      <button id="orange-ai-btn" style="position: fixed; bottom: 24px; right: 24px; width: 64px; height: 64px; background-color: #0f172a; border: 2px solid rgba(249, 115, 22, 0.6); border-radius: 50%; cursor: pointer; box-shadow: 0 10px 25px rgba(249, 115, 22, 0.35); display: flex; align-items: center; justify-content: center; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
        <div style="position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
          <span style="position: absolute; width: 100%; height: 100%; border-radius: 50%; background-color: #f97316; opacity: 0.4; animation: orangePulse 2s infinite ease-in-out;"></span>
          <span style="font-size: 32px; z-index: 2; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); transition: transform 0.2s;" id="orange-emoji">🍊</span>
          <span style="position: absolute; top: 2px; right: 2px; width: 12px; height: 12px; background-color: #10b981; border: 2px solid #fff; border-radius: 50%; z-index: 3;"></span>
        </div>
      </button>

      <div id="orange-ai-chatbox" style="display: none; position: fixed; bottom: 100px; right: 24px; width: 380px; max-width: calc(100vw - 48px); height: 500px; background: rgba(15, 23, 42, 0.96); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); flex-direction: column; overflow: hidden; transition: all 0.3s ease;">
        <div style="padding: 16px; background: rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: space-between;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <span style="width: 10px; height: 10px; background-color: #10b981; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite;"></span>
            <span style="color: #ffffff; font-size: 13px; font-weight: 800; letter-spacing: 0.5px;">FRESHKEEP SUPER AI 🍊</span>
          </div>
          <button id="close-chat-btn" style="background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; outline: none; line-height: 1;">&times;</button>
        </div>

        <div id="chat-messages" style="flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;">
          <div style="align-self: flex-start; max-width: 85%; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.05); color: #e2e8f0; padding: 12px 16px; border-radius: 16px; border-top-left-radius: 0; font-size: 13px; line-height: 1.5;">
            Chào bạn! Tôi là <strong>Siêu Trợ Lý Tủ Lạnh FreshKeep 🍊</strong>. Hãy thử hỏi tôi về các món ăn tối nay hoặc thực phẩm sắp hết hạn trong tủ lạnh nhé!
          </div>
        </div>

        <div style="padding: 8px 16px; display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; border-top: 1px solid rgba(255, 255, 255, 0.05); scrollbar-width: none;" id="quick-actions">
          <button class="quick-chip" data-msg="Gợi ý món ăn tối nay từ tủ lạnh" style="background: rgba(249, 115, 22, 0.15); border: 1px solid rgba(249, 115, 22, 0.3); color: #f97316; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; outline: none;">🍳 Gợi ý món tối nay</button>
          <button class="quick-chip" data-msg="Kiểm tra thực phẩm sắp hết hạn" style="background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; outline: none;">🚨 Thực phẩm hết hạn</button>
        </div>

        <form id="chat-form" style="padding: 12px 16px 16px; border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; gap: 8px;">
          <input type="text" id="chat-input" placeholder="Hỏi AI FreshKeep..." style="flex: 1; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 10px 14px; color: #ffffff; font-size: 13px; outline: none;" autocomplete="off" required>
          <button type="submit" style="background: #f97316; color: #ffffff; border: none; border-radius: 12px; padding: 0 16px; font-weight: 600; font-size: 13px; cursor: pointer;">Gửi</button>
        </form>
      </div>
    </div>
    <!-- END: FRESHKEEP ORANGE AI CHATBOT INTEGRATION -->

    <script type="text/babel" data-type="module" src="ung_dung.js"></script>
    <script src="tro_ly_ao.js"></script>
</body>
</html>
