    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #FFFDF9 0%, #FFF3DA 40%, #E6FFFA 100%);
            overflow-x: hidden;
        }
        /* Hoạt họa bồng bềnh tự nhiên */
        .floating-food {
            animation: float-animation 6s ease-in-out infinite;
            user-select: none;
            pointer-events: none;
        }
        @keyframes float-animation {
            0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
            50% { transform: translateY(-12px) rotate(5deg) scale(1.03); }
        }
        /* Hiệu ứng nhấp nháy cảnh báo động nguy hiểm */
        .alert-pulse {
            animation: pulse-glow 2.5s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.97); box-shadow: 0 0 15px rgba(239, 68, 68, 0.45); }
        }
        /* Ẩn thanh cuộn trình duyệt */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Hiệu ứng quét laser của barcode scanner */
        .laser-line {
            animation: scan-action 2s linear infinite;
        }
        @keyframes scan-action {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        /* Hiệu ứng chuyển động mượt mà */
        @keyframes slide-in {
            from { transform: translateY(1rem); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-in {
            animation: slide-in 0.25s ease-out forwards;
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fade-in 0.2s ease-out forwards;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        /* ==========================================================
           1. DATA LAYER: DANH MỤC CHUẨN & DỮ LIỆU BAN ĐẦU (MOCK DB)
           ========================================================= */
        const initialFoodItems = [
            { id: '1', name: 'Sữa tươi TH True Milk', quantity: '2 hộp 1L', category: 'Sữa & Đồ hộp', compartment: 'Cánh tủ', storage_location: 'Cánh tủ', expiryDate: new Date(Date.now() + 6 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false },
            { id: '2', name: 'Thịt bò Mỹ phi lê', quantity: '500g', category: 'Thịt & Hải sản', compartment: 'Ngăn đông', storage_location: 'Ngăn đông', expiryDate: new Date(Date.now() + 15 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false },
            { id: '3', name: 'Ức gà phi lê', quantity: '1kg', category: 'Thịt & Hải sản', compartment: 'Ngăn đông', storage_location: 'Ngăn đông', expiryDate: new Date(Date.now() + 2 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false },
            { id: '4', name: 'Ớt chuông đỏ', quantity: '3 quả', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', storage_location: 'Ngăn mát', expiryDate: new Date(Date.now() + 1 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false },
            { id: '5', name: 'Sữa bột ăn dặm cho bé', quantity: '1 hộp', category: 'Sữa & Đồ hộp', compartment: 'Ngăn đồ ăn dặm', storage_location: 'Ngăn đồ ăn dặm', expiryDate: new Date(Date.now() + 1 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: true, isCustom: false },
            { id: '6', name: 'Hành tây', quantity: '2 củ', category: 'Rau củ & Trái cây', compartment: 'Ngăn rau củ', storage_location: 'Ngăn rau củ', expiryDate: new Date(Date.now() + 8 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false },

];

        const monthlyHistoryData = [
            { month: 'Tháng 3', consumed: 72, wasted: 28 },
            { month: 'Tháng 4', consumed: 80, wasted: 20 },
            { month: 'Tháng 5', consumed: 88, wasted: 12 },
            { month: 'Tháng 6', consumed: 92, wasted: 8 }
        ];

        const RecipeCatalog = [
            { id: 'r1', name: 'Gà xào sả ớt', requiredIngredients: ['gà', 'sả', 'ớt'], desc: 'Món ăn đậm đà đưa cơm từ thịt gà thơm phức xào cay nồng.', emoji: '🍗' },
            { id: 'r2', name: 'Gà xào ớt chuông và hành tây', requiredIngredients: ['gà', 'ớt chuông', 'hành tây'], desc: 'Hương vị giòn ngọt thanh mát, dồi dào vitamin.', emoji: '🥗' },
            { id: 'r3', name: 'Súp gà nấm', requiredIngredients: ['gà', 'nấm'], desc: 'Món súp bồi bổ ấm nóng, dễ tiêu hóa cho cả em bé và gia đình.', emoji: '🍲' },
            { id: 'r4', name: 'Bò lúc lắc', requiredIngredients: ['bò', 'hành tây', 'ớt chuông'], desc: 'Thịt bò xào mềm ngon thấm vị cùng hành tây giòn ngọt.', emoji: '🥩' },
            { id: 'r5', name: 'Bò bít tết kèm khoai tây', requiredIngredients: ['bò', 'khoai tây'], desc: 'Món Âu sang trọng bổ dưỡng ăn kèm khoai tây chiên giòn rụm.', emoji: '🍟' },
            { id: 'r6', name: 'Canh thịt bò hầm khoai tây cà rốt', requiredIngredients: ['bò', 'khoai tây', 'cà rốt'], desc: 'Món canh bổ dưỡng hầm nhừ ngọt nước thích hợp cho gia đình.', emoji: '🥣' },
            { id: 'r7', name: 'Lẩu hải sản Thái Lan', requiredIngredients: ['tôm', 'mực', 'nghêu'], desc: 'Chua cay sảng khoái tụ tập họp mặt gia đình cuối tuần.', emoji: '🥘' },
            { id: 'r8', name: 'Hải sản xào thập cẩm', requiredIngredients: ['mực', 'tôm', 'súp lơ', 'cà rốt', 'bông cải'], desc: 'Hải sản xào thập cẩm đầy màu sắc dinh dưỡng cân đối.', emoji: '🍤' },
            { id: 'r9', name: 'Trứng cuộn phô mai', requiredIngredients: ['trứng', 'bơ', 'sữa', 'phô mai'], desc: 'Món mềm xốp béo ngậy cực kỳ yêu thích của trẻ nhỏ.', emoji: '🧀' },
            { id: 'r10', name: 'Bánh nướng bơ trứng', requiredIngredients: ['trứng', 'bơ', 'sữa'], desc: 'Bánh nướng bơ trứng đơn giản, tiện lợi cho bữa sáng.', emoji: '🍞' },
            { id: 'r11', name: 'Cơm chiên Dương Châu', requiredIngredients: ['trứng', 'cơm', 'xúc xích'], desc: 'Hạt cơm săn chắc kết hợp cùng xúc xích và trứng chiên giòn thơm.', emoji: '🍚' }
        ];

        const BasicDishes = [
            { name: 'Canh sườn hầm củ quả', category: 'Các món canh', desc: 'Canh sườn hầm ngọt thanh cùng khoai tây, cà rốt.' },
            { name: 'Canh chua cá lóc', category: 'Các món canh', desc: 'Món canh chua đậm đà Nam Bộ giải nhiệt mùa hè.' },
            { name: 'Canh cua rau đay', category: 'Các món canh', desc: 'Canh cua đồng thanh mát ăn kèm cà pháo giòn.' },
            { name: 'Thịt kho tàu', category: 'Các món mặn', desc: 'Thịt kho nước dừa rục mềm cùng trứng vịt.' },
            { name: 'Cá kho tộ', category: 'Các món mặn', desc: 'Cá lóc kho tộ sền sệt, đậm đà vị tiêu ớt.' },
            { name: 'Thịt ba chỉ rim mắm ruốc', category: 'Các món mặn', desc: 'Hương vị cay nồng, mặn ngọt cực kỳ đưa cơm.' },
            { name: 'Cánh gà chiên nước mắm', category: 'Các món mặn', desc: 'Vỏ ngoài giòn, ngập trong nước sốt tỏi mắm ngọt.' },
            { name: 'Sườn xào chua ngọt', category: 'Các món mặn', desc: 'Sườn non rim sốt chua ngọt hài hòa.' }
        ];

        const barcodeDatabase = {
            "8934563138129": { name: "Sữa tươi TH True Milk ít đường", category: "Sữa & Đồ hộp", quantity: "1 hộp 1L", compartment: "Cánh tủ" },
            "8934561230012": { name: "Mì ăn liền Hảo Hảo chua cay", category: "Đồ khô & Chế biến sẵn", quantity: "1 thùng (30 gói)", compartment: "Ngăn mát" },
            "8936011771123": { name: "Nước ngọt Coca-Cola Lon", category: "Đồ uống", quantity: "6 lon 320ml", compartment: "Cánh tủ" },
            "8930001012351": { name: "Sữa chua ăn Vinamilk có đường", category: "Sữa & Đồ hộp", quantity: "4 hộp", compartment: "Ngăn mát" },
            "8934673891045": { name: "Trứng gà tươi Ba Huân", category: "Sữa & Đồ hộp", quantity: "10 quả", compartment: "Ngăn mát" }
        };

        const FoodPlateIcon = ({ type }) => {
            const styleClass = "w-10 h-10 rounded-full flex items-center justify-center shadow-md border-2 border-white flex-shrink-0";
            switch (type) {
                case 'Thịt & Hải sản':
                    return (
                        <div className={`${styleClass} bg-rose-100`}>
                            <span className="text-lg">🥩</span>
                        </div>
                    );
                case 'Rau củ & Trái cây':
                    return (
                        <div className={`${styleClass} bg-emerald-100`}>
                            <span className="text-lg">🥦</span>
                        </div>
                    );
                case 'Sữa & Đồ hộp':
                    return (
                        <div className={`${styleClass} bg-sky-100`}>
                            <span className="text-lg">🥛</span>
                        </div>
                    );
                case 'Đồ khô & Chế biến sẵn':
                    return (
                        <div className={`${styleClass} bg-amber-100`}>
                            <span className="text-lg">🥫</span>
                        </div>
                    );
                case 'Đồ uống':
                    return (
                        <div className={`${styleClass} bg-purple-100`}>
                            <span className="text-lg">🍹</span>
                        </div>
                    );
                default:
                    return (
                        <div className={`${styleClass} bg-stone-100`}>
                            <span className="text-lg">📦</span>
                        </div>
                    );
            }
        };

        /* ==========================================================
           3. APPLICATION LAYER: DOMAIN LOGIC SERVICES
           ========================================================== */

        const NotificationEngine = {
            isSupported: () => {
                return ('Notification' in window) && window.isSecureContext;
            },

            getPermissionState: () => {
                if (!NotificationEngine.isSupported()) return 'unsupported';
                return Notification.permission;
            },

            requestPermission: () => {
                if (!NotificationEngine.isSupported()) return Promise.resolve(false);
                
                try {
                    return Notification.requestPermission().then(permission => {
                        return permission === 'granted';
                    });
                } catch (e) {
                    return new Promise((resolve) => {
                        try {
                            Notification.requestPermission(permission => {
                                resolve(permission === 'granted');
                            });
                        } catch (err) {
                            console.error("Lỗi khi cấp quyền thông báo đẩy:", err);
                            resolve(false);
                        }
                    });
                }
            },

            sendPush: (title, body, fallbackCallback) => {
                if (NotificationEngine.isSupported() && Notification.permission === 'granted') {
                    try {
                        new Notification(title, {
                            body: body,
                            icon: 'https://cdn-icons-png.flaticon.com/512/1157/1157109.png'
                        });
                        return true;
                    } catch (e) {
                        console.warn("Gửi thông báo Native thất bại, chuyển sang phương thức nội bộ:", e);
                    }
                }
                if (fallbackCallback) {
                    fallbackCallback(title, body);
                }
                return false;
            },

            triggerPersonaPush: (itemName, daysRemaining, category, fallbackCallback) => {
                let title = "🚨 FRESHKEEP - CẢNH BÁO HẠN DÙNG";
                let body = "";

                if (category === "Sữa & Đồ hộp" && itemName.toLowerCase().includes("em bé")) {
                    title = "⚠️ Cảnh báo nghiêm ngặt";
                    body = `Đồ ăn dặm của bé Mai chỉ còn ${daysRemaining} ngày hạn dùng. Hãy ưu tiên chế biến cho bé ngay! 👶`;
                } else if (itemName.toLowerCase().includes("cá hồi") || itemName.toLowerCase().includes("bò")) {
                    title = "🆘 Nấu ngay kẻo phí!";
                    body = `Món ngon "${itemName}" trong tủ sẽ hết hạn sau ${daysRemaining} ngày. Đừng để lãng phí nhé Thảo! 💸`;
                } else {
                    body = `Thực phẩm "${itemName}" sắp hết hạn sau ${daysRemaining} ngày. Vui lòng kiểm tra và chế biến kịp thời!`;
                }

                NotificationEngine.sendPush(title, body, fallbackCallback);
            }
        };

        const ExpiryEngine = {
            calculate: (item, warnDaysLimit = 3, pediatricWarnLimit = 2) => {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const expiry = new Date(item.expiryDate);
                expiry.setHours(0, 0, 0, 0);

                const diffTime = expiry.getTime() - today.getTime();
                const daysRemaining = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (daysRemaining < 0) {
                    return {
                        label: 'ĐÃ HẾT HẠN 🔴',
                        badgeStyle: { textColor: 'text-red-700', bgColor: 'bg-red-50', borderColor: 'border-red-200' },
                        sideColor: 'bg-red-500',
                        isPulse: true,
                        daysRemaining
                    };
                }

                if ((item.isPediatricCritical || item.compartment === 'Ngăn đồ ăn dặm') && daysRemaining <= pediatricWarnLimit) {
                    return {
                        label: `NGUY HIỂM: ĐỒ CỦA BÉ (${daysRemaining} ngày) 👶🚨`,
                        badgeStyle: { textColor: 'text-red-600', bgColor: 'bg-red-100', borderColor: 'border-red-400 font-black' },
                        sideColor: 'bg-red-600 alert-pulse',
                        isPulse: true,
                        daysRemaining
                    };
                }

                if (daysRemaining <= warnDaysLimit) {
                    return {
                        label: `SẮP HẾT HẠN (${daysRemaining} ngày) 🟡`,
                        badgeStyle: { textColor: 'text-orange-700', bgColor: 'bg-orange-50', borderColor: 'border-orange-200' },
                        sideColor: 'bg-orange-400',
                        isPulse: true,
                        daysRemaining
                    };
                }

                return {
                    label: 'TƯƠI MỚI 🟢',
                    badgeStyle: { textColor: 'text-emerald-700', bgColor: 'bg-emerald-50', borderColor: 'border-emerald-200' },
                    sideColor: 'bg-emerald-400',
                    isPulse: false,
                    daysRemaining
                };
            },

            getFallbackDays: (name, category, compartment) => {
                const n = name.toLowerCase();
                const c = compartment ? compartment.toLowerCase() : 'ngăn mát';

                if (category === 'Thịt & Hải sản' || n.includes('thịt') || n.includes('cá') || n.includes('tôm') || n.includes('mực') || n.includes('gà') || n.includes('vịt')) {
                    if (c.includes('đông')) {
                        if (n.includes('heo') || n.includes('lợn') || n.includes('ba chỉ') || n.includes('sườn')) return 150;
                        if (n.includes('bò xay')) return 105;
                        if (n.includes('bò')) return 270;
                        if (n.includes('gà') || n.includes('vịt') || n.includes('ức') || n.includes('đùi') || n.includes('cánh')) return 315;
                        if (n.includes('hồi') || n.includes('thu')) return 75;
                        if (n.includes('tôm') || n.includes('mực') || n.includes('nghêu') || n.includes('sò')) return 135;
                        return 90;
                    }
                    return 3;
                }

                if (category === 'Rau củ & Trái cây' || n.includes('rau') || n.includes('quả') || n.includes('trái cây') || n.includes('táo') || n.includes('cam')) {
                    if (n.includes('xà lách') || n.includes('muống') || n.includes('thìa') || n.includes('cải') || n.includes('bó xôi')) return 5;
                    if (n.includes('cà rốt') || n.includes('cà chua') || n.includes('ớt chuông')) return 10;
                    if (n.includes('hành lá') || n.includes('sả') || n.includes('ớt') || n.includes('tỏi') || n.includes('gừng')) return 10;
                    if (n.includes('táo') || n.includes('cam') || n.includes('chanh')) return 10;
                    return 7;
                }

                if (category === 'Sữa & Đồ hộp' || n.includes('sữa') || n.includes('bơ') || n.includes('phô mai') || n.includes('tương')) {
                    if (n.includes('sữa tươi')) return 8;
                    if (n.includes('sữa chua')) return 10;
                    if (n.includes('phô mai')) return 10;
                    if (n.includes('bơ')) return 60;
                    if (n.includes('mayonnaise') || n.includes('tương cà') || n.includes('tương ớt') || n.includes('sốt')) return 180;
                    return 10;
                }

                if (category === 'Đồ khô & Chế biến sẵn' || n.includes('xúc xích') || n.includes('thịt xông khói') || n.includes('mì') || n.includes('bún')) {
                    if (n.includes('xúc xích')) {
                        return c.includes('đông') ? 45 : 10; 
                    }
                    if (n.includes('xông khói')) {
                        return c.includes('đông') ? 30 : 7;
                    }
                    if (n.includes('mì') || n.includes('bún') || n.includes('phở')) return 365;
                    return 30;
                }

                if (category === 'Đồ uống' || n.includes('nước ép') || n.includes('nước ngọt') || n.includes('bia')) {
                    if (n.includes('nước ép')) return 8;
                    if (n.includes('nước ngọt')) return 180;
                    if (n.includes('bia')) return 210;
                    return 90;
                }

                return 5;
            },

            getHealthWarning: (name) => {
                if (!name) return null;
                const n = name.toLowerCase();
                if (n.includes('khoai tây') || n.includes('hành tây')) {
                    return '⚠️ Cảnh báo sức khỏe: Khoai tây và Hành tây không nên bảo quản trong tủ lạnh vì dễ bị mọc mầm, ẩm mốc và biến đổi tinh bột thành các chất không có lợi cho sức khỏe.';
                }
                if (n.includes('chuối')) {
                    return '⚠️ Lưu ý bảo quản: Chuối nên được treo bảo quản ở nhiệt độ phòng. Nhiệt độ tủ lạnh sẽ khiến chuối nhanh bị thâm đen và mất vị ngọt tự nhiên.';
                }
                return null;
            }
        };

        const RecipeEngine = {
            generateForCustomIngredient: (itemName) => {
                if (!itemName) return [];
                const name = itemName.trim();
                const lower = name.toLowerCase();
                
                if (lower.includes('đông trùng') || lower.includes('linh chi') || lower.includes('sâm') || lower.includes('thảo dược')) {
                    return [
                        { name: `Canh gà ta hầm sâm bổ lượng & ${name}`, desc: `Hầm gà cùng ${name}, hạt sen, táo đỏ và kỳ tử trong 1.5 giờ. Thích hợp bồi bổ sức khỏe cho gia đình.` },
                        { name: `Trà thảo mộc dưỡng nhan từ ${name}`, desc: `Hãm lát ${name} với nước sôi 85°C kèm kỷ tử và một chút đường phèn thanh mát.` }
                    ];
                }
                if (lower.includes('ốc') || lower.includes('nghêu') || lower.includes('hàu') || lower.includes('sò') || lower.includes('bào ngư')) {
                    return [
                        { name: `${name} hấp sả ớt cay nồng`, desc: `Hấp cách thủy ${name} cùng sả cây đập dập, gừng thái chỉ và ớt tươi. Chấm kèm nước mắm gừng ấm bụng.` },

        /* ==========================================================
           BỘ PHÂN TÍCH NLP DỰA TRÊN THỜI GIAN THỰC (DYNAMIC AI ENGINE)
           ========================================================== */
        const FridgyParser = {
            categoryKeywords: {
                'Thịt & Hải sản': ['thịt', 'bò', 'heo', 'gà', 'cá', 'tôm', 'mực', 'sườn', 'ba chỉ', 'bắp bò', 'gân bò', 'cá hồi'],
                'Rau củ & Trái cây': ['rau', 'cải', 'cà rốt', 'khoai', 'cà chua', 'hành', 'ớt', 'tỏi', 'gừng', 'sả', 'táo', 'chuối', 'cam', 'chanh', 'bông cải', 'súp lơ'],
                'Sữa & Đồ hộp': ['sữa', 'trứng', 'phô mai', 'bơ', 'mayonnaise', 'tương', 'đồ hộp', 'sữa chua'],
                'Đồ khô & Chế biến sẵn': ['xúc xích', 'thịt xông khói', 'mì', 'bún', 'phở', 'chà bông', 'ruốc'],
                'Đồ uống': ['nước ép', 'nước ngọt', 'bia', 'coca', 'pepsi', 'trà']
            },

            isCustomIngredient: (name) => {
                if (!name) return true;
                const n = name.toLowerCase();
                for (const [cat, keywords] of Object.entries(FridgyParser.categoryKeywords)) {
                    if (keywords.some(keyword => n.includes(keyword))) {
                        return false; 
                    }
                }
                return true; 
            },

            parseInstruction: (input, itemsList) => {
                const rawText = input.trim();
                const normalized = rawText.toLowerCase();

                // 1. TRUY VẤN THỰC PHẨM SẮP HẾT HẠN
                if (normalized.includes('sắp hết hạn') || normalized.includes('sắp hỏng') || normalized.includes('gần hết hạn')) {
                    const expiring = itemsList.filter(item => {
                        const exp = ExpiryEngine.calculate(item);
                        return exp.daysRemaining <= 3;
                    });
                    if (expiring.length === 0) {
                        return { success: false, message: 'Fridgy AI 🤖: Tuyệt vời! Hiện tại tôi kiểm tra thấy toàn bộ thực phẩm trong tủ đều ở trạng thái tươi mới, không có món nào sắp hết hạn gấp.' };
                    }
                    const listStr = expiring.map(i => `• ${i.name} (${i.quantity}) - còn ${ExpiryEngine.calculate(i).daysRemaining} ngày`).join('\n');
                    return { success: false, message: `Fridgy AI 🤖: Tôi phát hiện các thực phẩm sắp hết hạn trong 3 ngày tới:\n${listStr}\n\nBạn nên lên kế hoạch chế biến ngay nhé!` };
                }

                // 2. TRUY VẤN HẠN DÙNG CỤ THỂ CỦA MỘT THỨ
                if (normalized.includes('bao nhiêu ngày') || normalized.includes('khi nào hỏng') || normalized.includes('hạn sử dụng của') || normalized.includes('hạn dùng của')) {
                    let cleanQuery = normalized
                        .replace('hạn sử dụng của', '')
                        .replace('hạn dùng của', '')
                        .replace('còn bao nhiêu ngày', '')
                        .replace('nữa', '')
                        .replace('thì hỏng', '')
                        .replace('thì hết hạn', '')
                        .replace('kiểm tra', '')
                        .replace('?', '').trim();
                        
                    const found = itemsList.find(i => i.name.toLowerCase().includes(cleanQuery));
                    if (found) {
                        const info = ExpiryEngine.calculate(found);
                        if (info.daysRemaining < 0) {
                            return { success: false, message: `Fridgy AI 🤖: Món "${found.name}" lưu ở ${found.compartment} ĐÃ HẾT HẠN từ ${Math.abs(info.daysRemaining)} ngày trước rồi ạ! Bạn nên dọn bỏ.` };
                        }
                        return { success: false, message: `Fridgy AI 🤖: Thực phẩm "${found.name}" hiện đang lưu tại [${found.compartment}]. Hạn sử dụng còn lại: ${info.daysRemaining} ngày nữa.` };
                    }
                    return { success: false, message: `Fridgy AI 🤖: Tôi không tìm thấy món nào có tên khớp với "${cleanQuery}" trong tủ lạnh của bạn.` };
                }

                // 3. TRUY VẤN SỰ TỒN TẠI ("còn ... không", "có ... không")
                if (normalized.includes('còn') && (normalized.includes('không') || normalized.includes('ko'))) {
                    let searchedWord = normalized
                        .replace('trong tủ', '')
                        .replace('lạnh', '')
                        .replace('còn', '')
                        .replace('không', '')
                        .replace('ko', '')
                        .replace('có', '')
                        .replace('fridgy', '')
                        .replace('?', '').trim();

                    const matched = itemsList.filter(i => i.name.toLowerCase().includes(searchedWord));
                    if (matched.length > 0) {
                        const listStr = matched.map(i => `• ${i.name} (Số lượng: ${i.quantity}, vị trí: ${i.compartment})`).join('\n');
                        return { success: false, message: `Fridgy AI 🤖: Có nhé! Tôi tìm thấy thực phẩm khớp với yêu cầu của bạn:\n${listStr}` };
                    }
                    return { success: false, message: `Fridgy AI 🤖: Rất tiếc, tôi không tìm thấy "${searchedWord}" trong tủ. Bạn có muốn ghi chú món này vào tab "Sổ đi chợ" để mua bổ sung không?` };
                }

                // 4. TRUY VẤN LIỆT KÊ THEO NGĂN LƯU TRỮ
                if (normalized.includes('liệt kê') || normalized.includes('có gì') || normalized.includes('xem ngăn')) {
                    let compMatch = 'Ngăn mát';
                    if (normalized.includes('đông')) compMatch = 'Ngăn đông';
                    else if (normalized.includes('cánh')) compMatch = 'Cánh tủ';
                    else if (normalized.includes('rau') || normalized.includes('củ')) compMatch = 'Ngăn rau củ';
                    else if (normalized.includes('dặm') || normalized.includes('em bé') || normalized.includes('con')) compMatch = 'Ngăn đồ ăn dặm';

                    const matchedItems = itemsList.filter(i => i.compartment === compMatch);
                    if (matchedItems.length === 0) {
                        return { success: false, message: `Fridgy AI 🤖: Hiện tại vùng lưu trữ [${compMatch}] đang trống, chưa có thực phẩm nào.` };
                    }
                    const listStr = matchedItems.map(i => `• ${i.name} (${i.quantity})`).join('\n');
                    return { success: false, message: `Fridgy AI 🤖: Các thực phẩm đang có trong [${compMatch}] gồm:\n${listStr}` };
                }

                // 5. GỢI Ý MÓN ĂN THÔNG MINH DỰA TRÊN THỰC TẾ
                if (normalized.includes('nấu gì') || normalized.includes('gợi ý món') || normalized.includes('thực đơn') || normalized.includes('ăn gì')) {
                    const availableNames = itemsList.map(item => item.name.toLowerCase());
                    
                    let matchedRecipes = RecipeCatalog.map(recipe => {
                        let matchedIngredients = recipe.requiredIngredients.filter(req => 
                            availableNames.some(name => name.includes(req))
                        );
                        let score = matchedIngredients.length / recipe.requiredIngredients.length;
                        return { recipe, score, matchedIngredients };
                    }).filter(r => r.score > 0)
                      .sort((a, b) => b.score - a.score);

                    if (matchedRecipes.length > 0) {
                        const best = matchedRecipes[0];
                        const missing = best.recipe.requiredIngredients.filter(ing => !best.matchedIngredients.includes(ing));
                        
                        let resp = `Fridgy AI 🤖 gợi ý: Dựa trên những gì có trong tủ, món phù hợp nhất lúc này là "${best.recipe.name}" ${best.recipe.emoji}.\n`;
                        resp += `• Nguyên liệu sẵn có: ${best.matchedIngredients.join(', ')}\n`;
                        if (missing.length > 0) {
                            resp += `• Nguyên liệu còn thiếu: ${missing.join(', ')} (bạn có thể bấm thêm vào Sổ đi chợ nhé!)\n`;
                        }
                        resp += `• Hướng dẫn: ${best.recipe.desc}`;
                        return { success: false, message: resp };
                    }

                    return { success: false, message: 'Fridgy AI 🤖: Hiện tại nguyên liệu trong tủ hơi ít để kết hợp thành các món phức tạp. Bạn có thể sử dụng tính năng thêm nguyên liệu lạ hoặc vào tab "Sổ đi chợ" để chuẩn bị mua sắm nhé!' };
                }

                // 6. THỐNG KÊ LÃNG PHÍ & HAO HỤT
                if (normalized.includes('thống kê') || normalized.includes('vứt bỏ') || normalized.includes('lãng phí')) {
                    return { success: false, message: 'Fridgy AI 🤖: Thống kê hiệu năng tủ lạnh tháng này:\n- Tỷ lệ thực phẩm tiêu thụ thành công: 92%\n- Tỷ lệ hao hụt do quá hạn: 8% (chủ yếu là nhóm Rau củ bị quên ở góc ngăn mát).\n\nLời khuyên: Bạn nên bật tính năng "Cảnh báo nghiêm ngặt trước 2 ngày" trong tab Cài đặt để tối ưu hóa nhé!' };
                }

                if (normalized.includes('lời khuyên') || normalized.includes('tiết kiệm')) {
                    return { success: false, message: 'Fridgy AI 🤖 khuyên bạn:\n1. Nên chia nhỏ khẩu phần thịt trước khi trữ đông.\n2. Bọc màng thực phẩm hoặc dùng hộp hút chân không cho rau xanh.\n3. Đặt các thực phẩm sắp hết hạn ra phía ngoài cánh tủ hoặc ngăn mát chính để dễ thấy.' };
                }

                if (normalized.includes('quyền') || normalized.includes('chồng') || normalized.includes('vợ') || normalized.includes('chia sẻ')) {
                    return { success: false, message: 'Fridgy AI 🤖: Hệ thống tủ lạnh của bạn hiện được chia sẻ đồng bộ trực tiếp với Chồng (Bố trẻ nhỏ) và Trần Thu Thảo. Mọi hành động thêm/sửa/xóa của bạn hoặc Admin sẽ cập nhật ngay lập tức đến thiết bị của các thành viên.' };
                }

                // 7. XÓA MÓN ĂN (CRUD)
                if (normalized.startsWith('xóa món') || normalized.startsWith('xóa')) {
                    const targetName = normalized.replace('xóa món', '').replace('xóa', '').replace('khỏi danh sách', '').trim();
                    const found = itemsList.find(i => i.name.toLowerCase().includes(targetName));
                    if (found) {
                        return {
                            success: true,
                            action: 'delete',
                            targetId: found.id,
                            message: `Fridgy AI 🤖: Nhận lệnh xóa. Đã tiến hành gỡ bỏ "${found.name}" khỏi tủ lạnh.`
                        };
                    }
                    return { success: false, message: `Fridgy AI 🤖: Không tìm thấy thực phẩm nào khớp với tên "${targetName}" để thực hiện xóa.` };
                }

                // 8. SỬA SỐ LƯỢNG (CRUD)
                if (normalized.startsWith('sửa số lượng') || normalized.startsWith('sửa')) {
                    const updateRegex = /(?:sửa\s+số\s+lượng\s+|sửa\s+)(.+?)\s+thành\s+(.+)$/i;
                    const updateMatch = rawText.match(updateRegex);
                    if (updateMatch) {
                        const targetName = updateMatch[1].trim().toLowerCase();
                        const newQty = updateMatch[2].trim();
                        const found = itemsList.find(i => i.name.toLowerCase().includes(targetName));
                        if (found) {
                            return {
                                success: true,
                                action: 'update',
                                targetId: found.id,
                                newQuantity: newQty,
                                message: `Fridgy AI 🤖: Nhận lệnh cập nhật. Đã sửa số lượng món "${found.name}" thành [${newQty}] thành công.`
                            };
                        }
                    }
                    return { success: false, message: 'Fridgy AI 🤖: Sai cú pháp chỉnh sửa. Cú pháp đúng: "Sửa số lượng sữa tươi thành 2 hộp".' };
                }

                // 9. THÊM THỰC PHẨM (CRUD)
                const triggerKeywords = ['thêm', 'bỏ', 'cất', 'mua', 'để'];
                const hasTrigger = triggerKeywords.some(keyword => normalized.startsWith(keyword));

                if (!hasTrigger) {
                    return {
                        success: false,
                        message: 'Fridgy AI 🤖: Tôi chưa hiểu yêu cầu của bạn. Bạn hãy thử gõ: "Thêm 2 hộp sữa tươi vào ngăn mát" hoặc đặt câu hỏi như "Trong tủ có thịt bò không?".'
                    };
                }

                const structureRegex = /(?:thêm|bỏ|cất|mua|để)\s+(.+?)\s+vào\s+(ngăn mát|ngăn đông|cánh tủ|ngăn đồ ăn dặm|ngăn rau củ)/i;
                const match = rawText.match(structureRegex);

                if (!match) {
                    return {
                        success: false,
                        message: 'Fridgy AI 🤖: Tôi chưa xác định được vị trí cất giữ. Hãy viết rõ phân vùng: "... vào ngăn mát/ngăn đông/cánh tủ/ngăn đồ ăn dặm/ngăn rau củ".'
                    };
                }

                const itemSegment = match[1].trim();
                const compartmentSegment = match[2].trim().toLowerCase();

                const qtyRegex = /^(\d+\s*[a-zA-Zà-ỹÀ-Ỹ\s]+|\d+)\s+(.+)$/i;
                const qtyMatch = itemSegment.match(qtyRegex);

                let quantity = '1 phần';
                let name = itemSegment;

                if (qtyMatch) {
                    quantity = qtyMatch[1].trim();
                    name = qtyMatch[2].trim();
                }

                let compartment = 'Ngăn mát';
                if (compartmentSegment.includes('đông')) compartment = 'Ngăn đông';
                if (compartmentSegment.includes('cánh')) compartment = 'Cánh tủ';
                if (compartmentSegment.includes('dặm')) compartment = 'Ngăn đồ ăn dặm';
                if (compartmentSegment.includes('rau') || compartmentSegment.includes('củ')) compartment = 'Ngăn rau củ';

                let category = 'Khác';
                const nameLower = name.toLowerCase();

                for (const [cat, keywords] of Object.entries(FridgyParser.categoryKeywords)) {
                    if (keywords.some(keyword => nameLower.includes(keyword))) {
                        category = cat;
                        break;
                    }
                }

                const isStrangeIngredient = category === 'Khác' || FridgyParser.isCustomIngredient(name);
                const fallbackDays = ExpiryEngine.getFallbackDays(name, category, compartment);
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + fallbackDays);
                const expiryDate = targetDate.toISOString().split('T')[0];

                const healthWarn = ExpiryEngine.getHealthWarning(name);
                const warningSuffix = healthWarn ? `\n\n⚠️ Chú ý sức khỏe: ${healthWarn}` : '';

                const parsedItem = {
                    name: name.charAt(0).toUpperCase() + name.slice(1),
                    quantity,
                    category: isStrangeIngredient ? 'Khác' : category,
                    compartment,
                    expiryDate,
                    isPediatricCritical: compartment === 'Ngăn đồ ăn dặm',
                    isCustom: isStrangeIngredient
                };

                if (isStrangeIngredient) {
                    return {
                        success: true,
                        action: 'strange_confirmation',
                        message: `Fridgy AI 🤖 phát hiện "${parsedItem.name}" là một Nguyên liệu lạ (không có trong danh mục chuẩn). Tôi đang mở trình cấu hình thuật toán bảo quản để bạn thiết lập...`,
                        parsedItem
                    };
                }

                return {
                    success: true,
                    action: 'add',
                    message: `Fridgy AI 🤖: Đã xếp [${category}] -> "${parsedItem.name}" (${quantity}) vào ${compartment}. Thời hạn bảo quản lý tưởng là ${fallbackDays} ngày.${warningSuffix}`,
                    parsedItem
                };
            }
        };

                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.type = 'sine';
                    oscillator.frequency.value = 1000;
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.08);

                const userMsg = { sender: 'user', text: cmdText };
                setChatHistory(prev => [...prev, userMsg]);

                            setChatHistory(prev => [...prev, { sender: 'fridgy', text: res.message }]);

                const counts = { 'Thịt & Hải sản': 0, 'Rau củ & Trái cây': 0, 'Sữa & Đồ hộp': 0, 'Đồ khô & Chế biến sẵn': 0, 'Đồ uống': 0, 'Khác': 0 };
                items.forEach(i => { if (counts[i.category] !== undefined) counts[i.category]++; else counts['Khác']++; });
                
                const distribution = Object.keys(counts).map(key => ({
                    category: key,
                    percentage: total > 0 ? Math.round((counts[key] / total) * 100) : 0,
                    count: counts[key]
                })).filter(d => d.count > 0);

                return { total, distribution };
            }, [items]);

            const smartRecipes = useMemo(() => {
                const availableNames = items.map(item => item.name.toLowerCase());
                const criticalIngredients = items
                    .filter(item => ExpiryEngine.calculate(item, warnDaysLimit, pediatricWarnLimit).daysRemaining <= warnDaysLimit)
                    .map(item => item.name.toLowerCase());

                const matched = RecipeCatalog.map(recipe => {
                    let matchedIngredients = [];
                    let missingIngredients = [];
                    let criticalMatchCount = 0;

                    recipe.requiredIngredients.forEach(reqIng => {
                        const isAvailable = availableNames.some(name => name.includes(reqIng));
                        if (isAvailable) {
                            matchedIngredients.push(reqIng);
                            const isCritical = criticalIngredients.some(name => name.includes(reqIng));
                            if (isCritical) criticalMatchCount++;
                        } else {
                            missingIngredients.push(reqIng);
                        }
                    });

                    const matchScore = recipe.requiredIngredients.length > 0 
                        ? (matchedIngredients.length / recipe.requiredIngredients.length) 
                        : 0;

                    return {
                        recipe,
                        matchScore,
                        matchedIngredients,
                        missingIngredients,
                        criticalMatchCount
                    };
                });

                return matched
                    .filter(m => m.matchScore > 0)
                    .sort((a, b) => {
                        if (b.criticalMatchCount !== a.criticalMatchCount) {
                            return b.criticalMatchCount - a.criticalMatchCount;
                        }
                        return b.matchScore - a.matchScore;

                                                        onClick={() => setStrangeItemToConfirm({...strangeItemToConfirm, expiryDate: dateString})}
                                                        className={`py-2 px-1 text-[10px] font-bold rounded-xl border transition-all ${strangeItemToConfirm.expiryDate === dateString ? 'bg-amber-100 border-amber-300 text-amber-900 shadow-sm' : 'bg-stone-50 border-stone-100 text-stone-600'}`}
                                                    >
                                                        {opt.label}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* 3. Đề xuất công thức nấu ăn tự động */}
                                    <div className="border-t border-stone-100 pt-3">
                                        <label className="block text-[10px] font-extrabold text-teal-600 mb-1.5 uppercase tracking-wider">💡 Gợi ý món ăn phù hợp từ AI:</label>
                                        <div className="space-y-2 bg-teal-50/60 p-3 rounded-xl border border-teal-100">
                                            {RecipeEngine.generateForCustomIngredient(strangeItemToConfirm.name).map((recipe, rIdx) => (
                                                <div key={rIdx} className="text-left font-sans">
                                                    <p className="text-[10px] font-black text-teal-950">✦ {recipe.name}</p>
                                                    <p className="text-[9px] text-stone-600 leading-relaxed">{recipe.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 4. Phân cấp an toàn cho bé */}
                                    <div className="flex items-center gap-2 border-t border-stone-100 pt-3 font-sans">
                                        <input 
                                            type="checkbox" 
                                            id="strange_pedi_cb"
                                            checked={strangeItemToConfirm.isPediatricCritical || false}
                                            onChange={(e) => setStrangeItemToConfirm({...strangeItemToConfirm, isPediatricCritical: e.target.checked})}
                                            className="w-4 h-4 accent-red-500"
                                        />
                                        <label htmlFor="strange_pedi_cb" className="text-[11px] text-red-500 font-extrabold cursor-pointer select-none font-sans">
                                            🍼 Thiết lập bảo vệ khẩn cấp cho bé (Mai Persona)
                                        </label>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 border-t border-stone-100 pt-4 font-sans">
                                        <button 
                                            type="button"
                                            onClick={() => setStrangeItemToConfirm(null)}
                                            className="w-full bg-stone-100 hover:bg-stone-200 text-stone-700 font-bold py-2.5 rounded-xl text-xs"
                                        >
                                            Hủy bỏ
                                        </button>
                                        <button 
                                            type="button"
                                            onClick={() => {
                                                const today = new Date();
                                                today.setHours(0,0,0,0);
                                                const exp = new Date(strangeItemToConfirm.expiryDate);
                                                exp.setHours(0,0,0,0);
                                                const diff = Math.ceil((exp.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));

                                                handleConfirmStrangeIngredient(
                                                    strangeItemToConfirm.compartment,
                                                    diff > 0 ? diff : 5,
                                                    strangeItemToConfirm.isPediatricCritical
                                                );
                                            }}
                                            className="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white font-black py-2.5 rounded-xl text-xs shadow-md"
                                        >
                                            Xác nhận cất tủ
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FreshKeepApp />);
    </script>

<style>

    0% { transform: scale(1); opacity: 0.4; }

    100% { transform: scale(1); opacity: 0.4; }

  }
  #orange-ai-btn:hover #orange-emoji {
    transform: scale(1.15) rotate(12deg);

    filter: brightness(1.25);
    transform: translateY(-1px);

    border-color: rgba(249, 115, 22, 0.6);

<script>
  (function() {
    const btn = document.getElementById('orange-ai-btn');
    const chatbox = document.getElementById('orange-ai-chatbox');
    const closeBtn = document.getElementById('close-chat-btn');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input');
    const messagesContainer = document.getElementById('chat-messages');
    const quickChips = document.querySelectorAll('.quick-chip');

    // Toggle chatbox display
    btn.addEventListener('click', function() {
      if (chatbox.style.display === 'none' || chatbox.style.display === '') {
        chatbox.style.display = 'flex';
        input.focus();
      } else {
        chatbox.style.display = 'none';
      }
    });

    closeBtn.addEventListener('click', function() {
      chatbox.style.display = 'none';
    });

    // Handle Quick Action Chips
    quickChips.forEach(chip => {
      chip.addEventListener('click', function() {
        const msg = this.getAttribute('data-msg');
        sendMessage(msg);
      });
    });

    // Handle form submit
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const msg = input.value.trim();
      if (msg) {
        sendMessage(msg);
        input.value = '';
      }
    });

    function sendMessage(text) {
      appendMessage(text, 'user');
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      // Show temporary typing state
      const typingId = showTypingIndicator();
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      // Respond with structured smart mock answers
      setTimeout(function() {
        removeTypingIndicator(typingId);
        
        let aiResponse = "Tôi đã ghi nhận yêu cầu: '" + text + "'. Trợ lý FreshKeep đang phân tích dữ liệu tủ lạnh...";
        const lowerText = text.toLowerCase();
        
        if (lowerText.includes('hết hạn') || lowerText.includes('expire')) {
          aiResponse = "🚨 <strong>Phân tích khẩn cấp:</strong><br>• <strong>Ớt chuông đỏ:</strong> Sắp hết hạn trong 1 ngày!<br>• <strong>Thịt bò Mỹ phi lê:</strong> Đã được chuyển vào ngăn đông để bảo quản tối ưu.<br>👉 Đề xuất: Hãy nấu món <em>Thịt bò xào ớt chuông</em> ngay hôm nay để giữ nguyên hương vị!";
        } else if (lowerText.includes('tối nay') || lowerText.includes('món ăn') || lowerText.includes('nấu')) {
          aiResponse = "🍳 <strong>Món ngon đề xuất tối nay cho gia đình:</strong><br>1. <strong>Thịt bò Mỹ xào ớt chuông đỏ</strong> (Tận dụng nguyên liệu sẵn có, giàu dinh dưỡng).<br>2. <strong>Ức gà áp chảo sốt bơ tỏi</strong> (Món ăn nhanh, ít béo).<br>💬 Bạn có muốn tôi hướng dẫn chi tiết cách làm món nào không?";
        } else if (lowerText.includes('calo') || lowerText.includes('giảm cân') || lowerText.includes('kcal')) {
          aiResponse = "🥗 <strong>Thực đơn ăn sạch bảo toàn 1500 kcal:</strong><br>• <strong>Sáng:</strong> Sữa tươi TH True Milk & Ngũ cốc nguyên cám (350 kcal)<br>• <strong>Trưa:</strong> Ức gà phi lê áp chảo hành tây, xà lách trộn (550 kcal)<br>• <strong>Tối:</strong> Thịt bò Mỹ áp chảo măng tây (500 kcal)<br>• <strong>Phụ:</strong> Trái cây tươi (100 kcal)<br><em>Chế độ giàu đạm giúp bạn giữ cơ và duy trì năng lượng rất tốt!</em>";
        }
        
        appendMessage(aiResponse, 'ai');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }, 900);
    }

    function appendMessage(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.style.alignSelf = sender === 'user' ? 'flex-end' : 'flex-start';
      msgDiv.style.maxWidth = '85%';
      
      if (sender === 'user') {
        msgDiv.style.background = '#f97316';
        msgDiv.style.color = '#ffffff';
        msgDiv.style.borderTopRightRadius = '0';
      } else {
        msgDiv.style.background = 'rgba(255, 255, 255, 0.08)';
        msgDiv.style.border = '1px solid rgba(255, 255, 255, 0.05)';
        msgDiv.style.color = '#e2e8f0';
        msgDiv.style.borderTopLeftRadius = '0';
      }
      
      msgDiv.style.padding = '12px 16px';
      msgDiv.style.borderRadius = '16px';
      msgDiv.style.fontSize = '13px';
      msgDiv.style.lineHeight = '1.5';
      msgDiv.innerHTML = text;
      
      messagesContainer.appendChild(msgDiv);
    }

    function showTypingIndicator() {
      const id = 'typing_' + Date.now();
      const typingDiv = document.createElement('div');
      typingDiv.id = id;
      typingDiv.style.alignSelf = 'flex-start';
      typingDiv.style.background = 'rgba(255, 255, 255, 0.05)';
      typingDiv.style.padding = '12px 16px';
      typingDiv.style.borderRadius = '16px';
      typingDiv.style.borderTopLeftRadius = '0';
      typingDiv.style.color = '#94a3b8';
      typingDiv.style.fontSize = '12px';
      typingDiv.innerHTML = 'FreshKeep AI đang nhập... <span class="animate-pulse">● ● ●</span>';
      messagesContainer.appendChild(typingDiv);
      return id;
    }

    function removeTypingIndicator(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }
  })();
</script>
