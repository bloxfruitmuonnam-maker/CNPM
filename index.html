<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshKeep - Hệ thống Giám sát & Quản lý Tủ lạnh Thông minh</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js" crossorigin></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #FFFDF9 0%, #FFF3DA 40%, #E6FFFA 100%);
            overflow-x: hidden;
        }
        .floating-food {
            animation: float-animation 6s ease-in-out infinite;
            user-select: none;
            pointer-events: none;
        }
        @keyframes float-animation {
            0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
            50% { transform: translateY(-18px) rotate(10deg) scale(1.05); }
        }
        .alert-pulse {
            animation: pulse-glow 2.5s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.97); box-shadow: 0 0 15px rgba(239, 68, 68, 0.55); }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .chat-fade-in {
            animation: fadeInUp 0.4s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        /* ============================================================
           NUTRITIONAL DATABASE & RECIPE ENGINE WITH AI
           ============================================================ */
        
        const NutritionDatabase = {
            'Thịt bò Mỹ phi lê': { calories: 250, protein: 26, carbs: 0, fat: 15, fiber: 0, calcium: 12, iron: 2.6 },
            'Ức gà phi lê': { calories: 165, protein: 31, carbs: 0, fat: 3.6, fiber: 0, calcium: 11, iron: 0.9 },
            'Ớt chuông đỏ': { calories: 31, protein: 1, carbs: 6, fat: 0.3, fiber: 2, calcium: 7, iron: 0.4 },
            'Hành tây': { calories: 40, protein: 1.1, carbs: 9, fat: 0.1, fiber: 1.7, calcium: 23, iron: 0.2 },
            'Bông cải xanh': { calories: 34, protein: 3.7, carbs: 7, fat: 0.4, fiber: 2.4, calcium: 47, iron: 0.7 },
            'Sữa tươi TH True Milk': { calories: 66, protein: 3.3, carbs: 4.8, fat: 3.6, fiber: 0, calcium: 113, iron: 0 },
            'Cà rốt': { calories: 41, protein: 0.9, carbs: 10, fat: 0.2, fiber: 2.8, calcium: 33, iron: 0.3 },
            'Trứng': { calories: 155, protein: 13, carbs: 1.1, fat: 11, fiber: 0, calcium: 56, iron: 1.8 },
            'Tôm': { calories: 99, protein: 24, carbs: 0, fat: 0.3, fiber: 0, calcium: 52, iron: 0.3 },
            'Cá hồi': { calories: 208, protein: 20, carbs: 0, fat: 13, fiber: 0, calcium: 12, iron: 0.8 }
        };

        const RecipeDatabase = {
            'Gà xào ớt chuông và hành tây': {
                ingredients: ['gà', 'ớt chuông', 'hành tây'],
                instructions: '1. Thái gà thành khúc nhỏ, ớt chuông thành sợi\n2. Phi hành tây với dầu nóng\n3. Xào gà trên lửa lớn đến khi ngoài vàng\n4. Thêm ớt chuông, nêm gia vị và xào chín',
                priority: 10,
                nutrition: {
                    calories: 280,
                    protein: 35,
                    carbs: 8,
                    fat: 12,
                    fiber: 1.5,
                    calcium: 25,
                    iron: 1.2,
                    servings: 2
                },
                cookTime: 20,
                difficulty: 'Dễ'
            },
            'Bò lúc lắc': {
                ingredients: ['bò', 'hành tây', 'ớt chuông'],
                instructions: '1. Cắt bò thành khúc 2cm\n2. Hành tây, ớt chuông thái hạt lựu\n3. Nêm bò với muối, tiêu\n4. Xào nhanh trên lửa rất lớn 2-3 phút',
                priority: 9,
                nutrition: {
                    calories: 320,
                    protein: 38,
                    carbs: 12,
                    fat: 14,
                    fiber: 2,
                    calcium: 30,
                    iron: 2.8,
                    servings: 2
                },
                cookTime: 15,
                difficulty: 'Dễ'
            },
            'Canh bông cải với cà rốt': {
                ingredients: ['bông cải', 'cà rốt', 'gà'],
                instructions: '1. Gà luộc chín, cắt nhỏ\n2. Bông cải, cà rốt thái hạt lựu nhỏ\n3. Nấu nước dùng sôi, thêm rau\n4. Nêm gia vị, nấu 10 phút cho rau chín',
                priority: 8,
                nutrition: {
                    calories: 150,
                    protein: 18,
                    carbs: 12,
                    fat: 3,
                    fiber: 3,
                    calcium: 80,
                    iron: 1.2,
                    servings: 2
                },
                cookTime: 25,
                difficulty: 'Rất dễ'
            },
            'Tôm xào bông cải': {
                ingredients: ['tôm', 'bông cải', 'hành tây'],
                instructions: '1. Tôm rửa sạch, bỏ vỏ\n2. Bông cải tách thành từng nụ\n3. Phi hành tây với tỏi\n4. Xào tôm nhanh, thêm bông cải, nêm gia vị',
                priority: 9,
                nutrition: {
                    calories: 180,
                    protein: 26,
                    carbs: 10,
                    fat: 4,
                    fiber: 2.5,
                    calcium: 75,
                    iron: 1.5,
                    servings: 2
                },
                cookTime: 15,
                difficulty: 'Dễ'
            },
            'Cà rốt sốt bơ': {
                ingredients: ['cà rốt', 'bơ', 'trứng'],
                instructions: '1. Cà rốt hấp mềm\n2. Bơ tan chảy, trộn cà rốt\n3. Nêm gia vị\n4. Có thể rắc trứng trần chiên lên trên',
                priority: 6,
                nutrition: {
                    calories: 120,
                    protein: 2,
                    carbs: 12,
                    fat: 7,
                    fiber: 2.5,
                    calcium: 50,
                    iron: 0.4,
                    servings: 1
                },
                cookTime: 15,
                difficulty: 'Rất dễ'
            }
        };

        const AIRecipeAnalyzer = {
            analyzeIngredients: (items) => {
                const expiringFirst = items.filter(item => ExpiryEngine.calculate(item).daysRemaining <= 3).sort((a, b) => 
                    ExpiryEngine.calculate(a).daysRemaining - ExpiryEngine.calculate(b).daysRemaining
                );

                const recommendations = [];
                const itemNames = items.map(i => i.name.toLowerCase());

                for (const [recipeName, recipeData] of Object.entries(RecipeDatabase)) {
                    let matchScore = 0;
                    let criticalMatches = 0;

                    recipeData.ingredients.forEach(ing => {
                        const isAvailable = itemNames.some(name => name.includes(ing));
                        if (isAvailable) {
                            matchScore++;
                            const isCritical = expiringFirst.some(item => item.name.toLowerCase().includes(ing));
                            if (isCritical) criticalMatches++;
                        }
                    });

                    if (matchScore >= recipeData.ingredients.length * 0.6) {
                        recommendations.push({
                            name: recipeName,
                            matchPercentage: Math.round((matchScore / recipeData.ingredients.length) * 100),
                            criticalMatches,
                            data: recipeData,
                            priority: recipeData.priority + (criticalMatches * 5)
                        });
                    }
                }

                return recommendations.sort((a, b) => b.priority - a.priority);
            },

            generateDetailedRecipe: (recipeName, availableItems, recipeData) => {
                const usableIngredients = availableItems.filter(item =>
                    recipeData.ingredients.some(ing => item.name.toLowerCase().includes(ing))
                );

                const totalNutrition = {
                    calories: recipeData.nutrition.calories,
                    protein: recipeData.nutrition.protein,
                    carbs: recipeData.nutrition.carbs,
                    fat: recipeData.nutrition.fat,
                    fiber: recipeData.nutrition.fiber,
                    calcium: recipeData.nutrition.calcium,
                    iron: recipeData.nutrition.iron
                };

                return {
                    name: recipeName,
                    ingredients: usableIngredients,
                    instructions: recipeData.instructions,
                    nutrition: totalNutrition,
                    cookTime: recipeData.cookTime,
                    difficulty: recipeData.difficulty,
                    servings: recipeData.nutrition.servings,
                    tips: AIRecipeAnalyzer.generateCookingTips(recipeName)
                };
            },

            generateCookingTips: (recipeName) => {
                const tips = {
                    'Gà xào ớt chuông và hành tây': [
                        '✓ Gà nên thái mỏng để nấu nhanh và mềm hơn',
                        '✓ Đun lửa to để gà ngoài giòn, trong mềm',
                        '✓ Thêm ớt chuông vào cuối để giữ độ giòn ngọt'
                    ],
                    'Bò lúc lắc': [
                        '✓ Lửa phải rất nóng để bò ngoài cháy mà trong còn hồng',
                        '✓ Không nên xào quá lâu, tối đa 3 phút',
                        '✓ Thêm muối phay ngoài cùng để tăng kích thích vị giác'
                    ],
                    'Canh bông cải với cà rốt': [
                        '✓ Nước dùng càng thơm thì canh càng ngon',
                        '✓ Đừng nấu quá lâu để rau không bị thối',
                        '✓ Có thể thêm nấm để tăng độ đậm đà'
                    ],
                    'Tôm xào bông cải': [
                        '✓ Tôm luộc tới có màu hồng, hạn chế xào quá để không bị cứng',
                        '✓ Bông cải thêm vào cuối để giữ độ giòn',
                        '✓ Có thể thêm tỏi sau khi xào để tỏi không bị cơm'
                    ]
                };
                return tips[recipeName] || ['✓ Nêm gia vị kỹ', '✓ Nấu lửa vừa để không bị cháy'];
            }
        };

        const MealPlanGenerator = {
            generateWeeklyPlan: (items) => {
                const recommendations = AIRecipeAnalyzer.analyzeIngredients(items);
                const weekDays = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'Chủ nhật'];
                const weeklyPlan = [];

                weekDays.forEach((day, index) => {
                    const mealIndex = index % recommendations.length;
                    if (recommendations[mealIndex]) {
                        weeklyPlan.push({
                            day: day,
                            recipe: recommendations[mealIndex].name,
                            nutrition: recommendations[mealIndex].data.nutrition,
                            matchPercentage: recommendations[mealIndex].matchPercentage
                        });
                    }
                });

                return weeklyPlan;
            },

            calculateWeeklyNutrition: (weeklyPlan) => {
                const totals = {
                    calories: 0,
                    protein: 0,
                    carbs: 0,
                    fat: 0,
                    fiber: 0,
                    calcium: 0,
                    iron: 0
                };

                weeklyPlan.forEach(meal => {
                    totals.calories += meal.nutrition.calories;
                    totals.protein += meal.nutrition.protein;
                    totals.carbs += meal.nutrition.carbs;
                    totals.fat += meal.nutrition.fat;
                    totals.fiber += meal.nutrition.fiber;
                    totals.calcium += meal.nutrition.calcium;
                    totals.iron += meal.nutrition.iron;
                });

                return {
                    totals,
                    averages: {
                        caloriesPerDay: Math.round(totals.calories / 7),
                        proteinPerDay: Math.round(totals.protein / 7),
                        carbsPerDay: Math.round(totals.carbs / 7),
                        fatPerDay: Math.round(totals.fat / 7)
                    }
                };
            }
        };

        const ExpiryEngine = {
            calculate: (item, warnDaysLimit = 3, pediatricWarnLimit = 2) => {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const expiry = new Date(item.expiryDate);
                expiry.setHours(0, 0, 0, 0);

                const diffTime = expiry.getTime() - today.getTime();
                const daysRemaining = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (daysRemaining < 0) {
                    return {
                        label: 'ĐÃ HẾT HẠN 🔴',
                        badgeStyle: { textColor: 'text-red-700', bgColor: 'bg-red-50', borderColor: 'border-red-200' },
                        sideColor: 'bg-red-500',
                        isPulse: true,
                        daysRemaining
                    };
                }

                if ((item.isPediatricCritical || item.compartment === 'Ngăn đồ ăn dặm') && daysRemaining <= pediatricWarnLimit) {
                    return {
                        label: `NGUY HIỂM: ĐỒ CỦA BÉ (${daysRemaining} ngày) 👶🚨`,
                        badgeStyle: { textColor: 'text-red-600', bgColor: 'bg-red-100', borderColor: 'border-red-400 font-black' },
                        sideColor: 'bg-red-600 alert-pulse',
                        isPulse: true,
                        daysRemaining
                    };
                }

                if (daysRemaining <= warnDaysLimit) {
                    return {
                        label: `SẮP HẾT HẠN (${daysRemaining} ngày) 🟡`,
                        badgeStyle: { textColor: 'text-orange-700', bgColor: 'bg-orange-50', borderColor: 'border-orange-200' },
                        sideColor: 'bg-orange-400',
                        isPulse: true,
                        daysRemaining
                    };
                }

                return {
                    label: 'TƯƠI MỚI 🟢',
                    badgeStyle: { textColor: 'text-emerald-700', bgColor: 'bg-emerald-50', borderColor: 'border-emerald-200' },
                    sideColor: 'bg-emerald-400',
                    isPulse: false,
                    daysRemaining
                };
            },

            getFallbackDays: (name, category, compartment) => {
                const n = name.toLowerCase();
                const c = compartment ? compartment.toLowerCase() : 'ngăn mát';

                if (category === 'Thịt & Hải sản' || n.includes('thịt') || n.includes('cá') || n.includes('tôm') || n.includes('mực') || n.includes('gà') || n.includes('vịt')) {
                    if (c.includes('đông')) {
                        if (n.includes('heo') || n.includes('lợn') || n.includes('ba chỉ') || n.includes('sườn')) return 150;
                        if (n.includes('bò xay')) return 105;
                        if (n.includes('bò')) return 270;
                        if (n.includes('gà') || n.includes('vịt') || n.includes('ức') || n.includes('đùi') || n.includes('cánh')) return 315;
                        if (n.includes('hồi') || n.includes('thu')) return 75;
                        if (n.includes('tôm') || n.includes('mực') || n.includes('nghêu') || n.includes('sò')) return 135;
                        return 90;
                    }
                    return 3;
                }

                if (category === 'Rau củ & Trái cây' || n.includes('rau') || n.includes('quả') || n.includes('trái cây') || n.includes('táo') || n.includes('cam')) {
                    if (n.includes('xà lách') || n.includes('muống') || n.includes('thìa') || n.includes('cải') || n.includes('bó xôi')) return 5;
                    if (n.includes('cà rốt') || n.includes('cà chua') || n.includes('ớt chuông')) return 10;
                    if (n.includes('hành lá') || n.includes('sả') || n.includes('ớt') || n.includes('tỏi') || n.includes('gừng')) return 10;
                    if (n.includes('táo') || n.includes('cam') || n.includes('chanh')) return 10;
                    return 7;
                }

                if (category === 'Sữa & Đồ hộp' || n.includes('sữa') || n.includes('bơ') || n.includes('phô mai') || n.includes('tương')) {
                    if (n.includes('sữa tươi')) return 8;
                    if (n.includes('sữa chua')) return 10;
                    if (n.includes('phô mai')) return 10;
                    if (n.includes('bơ')) return 60;
                    if (n.includes('mayonnaise') || n.includes('tương cà') || n.includes('tương ớt') || n.includes('sốt')) return 180;
                    return 10;
                }

                return 5;
            }
        };

        const initialFoodItems = [
            { id: '1', name: 'Sữa tươi TH True Milk', quantity: '2 hộp 1L', category: 'Sữa & Đồ hộp', compartment: 'Cánh tủ', expiryDate: new Date(Date.now() + 6 * 24 * 60 * 60 * 1000).toISOString().split('T')[0] },
            { id: '2', name: 'Thịt bò Mỹ phi lê', quantity: '500g', category: 'Thịt & Hải sản', compartment: 'Ngăn đông', expiryDate: new Date(Date.now() + 15 * 24 * 60 * 60 * 1000).toISOString().split('T')[0] },
            { id: '3', name: 'Ức gà phi lê', quantity: '1kg', category: 'Thịt & Hải sản', compartment: 'Ngăn đông', expiryDate: new Date(Date.now() + 2 * 24 * 60 * 60 * 1000).toISOString().split('T')[0] },
            { id: '4', name: 'Ớt chuông đỏ', quantity: '3 quả', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', expiryDate: new Date(Date.now() + 1 * 24 * 60 * 60 * 1000).toISOString().split('T')[0] },
            { id: '6', name: 'Hành tây', quantity: '2 củ', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', expiryDate: new Date(Date.now() + 8 * 24 * 60 * 60 * 1000).toISOString().split('T')[0] },
            { id: '7', name: 'Bông cải xanh', quantity: '1 cây', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', expiryDate: new Date(Date.now() + 1 * 24 * 60 * 60 * 1000).toISOString().split('T')[0] },
            { id: '8', name: 'Cà rốt', quantity: '500g', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', expiryDate: new Date(Date.now() + 10 * 24 * 60 * 60 * 1000).toISOString().split('T')[0] }
        ];

        function AIRecipeChatBox({ items }) {
            const [chatMessages, setChatMessages] = useState([
                { role: 'ai', text: '🤖 Xin chào! Tôi là AI Chef Assistant. Tôi có thể:\n✓ Phân tích nguyên liệu của bạn\n✓ Gợi ý công thức nấu ăn chi tiết\n✓ Cung cấp thông tin dinh dưỡng đầy đủ\n✓ Lập kế hoạch ăn uống theo tuần\n\nHãy hỏi tôi: "Gợi ý công thức" hoặc "Lập kế hoạch tuần"', timestamp: new Date() }
            ]);
            const [inputValue, setInputValue] = useState('');
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [weeklyPlan, setWeeklyPlan] = useState(null);
            const [showNutrition, setShowNutrition] = useState(false);

            const handleSendMessage = () => {
                if (!inputValue.trim()) return;

                const userMessage = inputValue.toLowerCase().trim();
                setChatMessages(prev => [...prev, { role: 'user', text: inputValue, timestamp: new Date() }]);
                setInputValue('');

                setTimeout(() => {
                    if (userMessage.includes('gợi ý công thức')) {
                        const recommendations = AIRecipeAnalyzer.analyzeIngredients(items);
                        if (recommendations.length === 0) {
                            setChatMessages(prev => [...prev, { 
                                role: 'ai', 
                                text: '😔 Không có nguyên liệu phù hợp để gợi ý công thức. Vui lòng thêm thêm nguyên liệu!',
                                timestamp: new Date()
                            }]);
                        } else {
                            const topRecipe = recommendations[0];
                            setChatMessages(prev => [...prev, { 
                                role: 'ai', 
                                text: `🍳 Dựa trên nguyên liệu của bạn, tôi gợi ý món: "${topRecipe.name}" với khả năng sử dụng ${topRecipe.matchPercentage}%\n\nBạn muốn xem chi tiết công thức này không?`,
                                timestamp: new Date(),
                                action: 'showRecipe',
                                recipe: topRecipe
                            }]);
                            setSelectedRecipe(topRecipe);
                        }
                    } else if (userMessage.includes('lập kế hoạch') || userMessage.includes('tuần')) {
                        const plan = MealPlanGenerator.generateWeeklyPlan(items);
                        const nutrition = MealPlanGenerator.calculateWeeklyNutrition(plan);
                        setWeeklyPlan({ plan, nutrition });
                        setChatMessages(prev => [...prev, { 
                            role: 'ai', 
                            text: `📋 Đã tạo kế hoạch ăn uống cho tuần này!\n\n📊 Thống kê tuần:\n• Tổng calo: ${nutrition.totals.calories} kcal\n• Bình quân/ngày: ${nutrition.averages.caloriesPerDay} kcal\n• Protein: ${nutrition.totals.protein}g (${nutrition.averages.proteinPerDay}g/ngày)`,
                            timestamp: new Date(),
                            action: 'showPlan'
                        }]);
                    } else if (userMessage.includes('dinh dưỡng') || userMessage.includes('nutrition')) {
                        setShowNutrition(true);
                        setChatMessages(prev => [...prev, { 
                            role: 'ai', 
                            text: `📊 Đã mở chi tiết dinh dưỡng của công thức!`,
                            timestamp: new Date()
                        }]);
                    } else if (userMessage.includes('tôi còn gì') || userMessage.includes('còn gì')) {
                        const expiringItems = items.filter(item => ExpiryEngine.calculate(item).daysRemaining <= 3);
                        const freshItems = items.filter(item => ExpiryEngine.calculate(item).daysRemaining > 3);
                        setChatMessages(prev => [...prev, { 
                            role: 'ai', 
                            text: `📦 Tổng: ${items.length} nguyên liệu\n\n🟡 Sắp hết hạn (${expiringItems.length}):\n${expiringItems.map(i => `• ${i.name} (${ExpiryEngine.calculate(i).daysRemaining} ngày)`).join('\n')}\n\n🟢 Còn tươi (${freshItems.length}):\n${freshItems.slice(0, 3).map(i => `• ${i.name}`).join('\n')}${freshItems.length > 3 ? `\n... và ${freshItems.length - 3} nguyên liệu khác` : ''}`,
                            timestamp: new Date()
                        }]);
                    } else {
                        setChatMessages(prev => [...prev, { 
                            role: 'ai', 
                            text: `💡 Tôi có thể giúp bạn:\n• "Gợi ý công thức" - dựa trên nguyên liệu hiện có\n• "Lập kế hoạch tuần" - lên menu cho cả tuần\n• "Dinh dưỡng" - xem chi tiết giá trị dinh dưỡng\n• "Tôi còn gì" - kiểm tra nguyên liệu\n\nHãy thử một trong những lệnh này!`,
                            timestamp: new Date()
                        }]);
                    }
                }, 500);
            };

            return (
                <div className="flex flex-col h-full bg-gradient-to-br from-purple-50/80 to-blue-50/80 rounded-3xl border-2 border-purple-200/50 overflow-hidden shadow-2xl">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-purple-500 to-blue-500 text-white px-6 py-4 shadow-lg">
                        <h2 className="text-2xl font-black">🤖 AI Chef Assistant</h2>
                        <p className="text-sm opacity-90">Phân tích nguyên liệu & gợi ý công thức thông minh</p>
                    </div>

                    {/* Chat Area */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar bg-gradient-to-b from-transparent to-purple-50/30">
                        {chatMessages.map((msg, idx) => (
                            <div key={idx} className={`chat-fade-in flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-xs px-4 py-3 rounded-2xl shadow-md ${
                                    msg.role === 'user' 
                                        ? 'bg-gradient-to-br from-purple-500 to-purple-600 text-white rounded-br-none' 
                                        : 'bg-white text-gray-800 border-2 border-purple-200 rounded-bl-none'
                                }`}>
                                    <p className="text-sm whitespace-pre-wrap font-medium">{msg.text}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Recipe Details */}
                    {selectedRecipe && (
                        <div className="border-t-2 border-purple-200 bg-gradient-to-br from-purple-50 to-white p-4 max-h-72 overflow-y-auto shadow-inner">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="font-bold text-lg text-purple-800">🍳 {selectedRecipe.name}</h3>
                                <button onClick={() => setSelectedRecipe(null)} className="text-2xl">✕</button>
                            </div>
                            <div className="grid grid-cols-2 gap-2 text-xs mb-3 bg-white p-2 rounded-lg border-l-4 border-purple-400">
                                <div>⏱️ {selectedRecipe.data.cookTime} phút</div>
                                <div>📊 Độ khó: {selectedRecipe.data.difficulty}</div>
                                <div>👥 {selectedRecipe.data.nutrition.servings} phần</div>
                                <div>✅ {selectedRecipe.matchPercentage}% nguyên liệu</div>
                            </div>
                            <p className="text-xs text-gray-700 whitespace-pre-wrap mb-3 bg-white p-2 rounded-lg">{selectedRecipe.data.instructions}</p>
                            
                            {showNutrition && (
                                <div className="bg-gradient-to-br from-purple-50 to-blue-50 rounded-lg p-3 text-xs space-y-2 border-l-4 border-purple-400 mb-3">
                                    <p className="font-bold text-purple-800">🥗 Dinh dưỡng (1 phần):</p>
                                    <div className="grid grid-cols-2 gap-2 text-gray-700">
                                        <p>🔥 Calo: {selectedRecipe.data.nutrition.calories} kcal</p>
                                        <p>💪 Protein: {selectedRecipe.data.nutrition.protein}g</p>
                                        <p>🌾 Carbs: {selectedRecipe.data.nutrition.carbs}g</p>
                                        <p>🧈 Fat: {selectedRecipe.data.nutrition.fat}g</p>
                                    </div>
                                </div>
                            )}
                            
                            <button 
                                onClick={() => setShowNutrition(!showNutrition)}
                                className="w-full bg-gradient-to-r from-purple-500 to-blue-500 hover:from-purple-600 hover:to-blue-600 text-white text-xs py-2 rounded-lg font-bold transition-all transform hover:scale-105 shadow-md"
                            >
                                {showNutrition ? '📊 Ẩn' : '📊 Xem'} Dinh dưỡng chi tiết
                            </button>
                        </div>
                    )}

                    {/* Weekly Plan Display */}
                    {weeklyPlan && (
                        <div className="border-t-2 border-purple-200 bg-gradient-to-br from-blue-50 to-purple-50 p-4 max-h-72 overflow-y-auto shadow-inner">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="font-bold text-lg text-blue-800">📋 Kế hoạch tuần</h3>
                                <button onClick={() => setWeeklyPlan(null)} className="text-2xl">✕</button>
                            </div>
                            <div className="space-y-1">
                                {weeklyPlan.plan.map((meal, idx) => (
                                    <div key={idx} className="flex justify-between items-center bg-white p-2 rounded border-l-4 border-blue-400 text-xs shadow-sm hover:shadow-md transition-all">
                                        <span className="font-semibold text-blue-600">{meal.day}</span>
                                        <span className="text-gray-700 text-center flex-1">{meal.recipe}</span>
                                        <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold">{meal.matchPercentage}%</span>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-3 bg-white p-3 rounded-lg border-l-4 border-blue-400 text-xs text-gray-700 space-y-1">
                                <p className="font-bold text-blue-800">📊 Tổng hợp tuần:</p>
                                <p>🔥 Tổng calo: {weeklyPlan.nutrition.totals.calories} kcal ({weeklyPlan.nutrition.averages.caloriesPerDay}/ngày)</p>
                                <p>💪 Protein: {weeklyPlan.nutrition.totals.protein}g ({weeklyPlan.nutrition.averages.proteinPerDay}g/ngày)</p>
                            </div>
                        </div>
                    )}

                    {/* Input Area */}
                    <div className="border-t-2 border-purple-200 bg-white p-4 flex gap-2 shadow-lg">
                        <input
                            type="text"
                            placeholder="Nhập lệnh hoặc câu hỏi..."
                            value={inputValue}
                            onChange={(e) => setInputValue(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                            className="flex-1 px-4 py-2 border-2 border-purple-300 rounded-full outline-none focus:border-purple-600 focus:shadow-lg text-sm transition-all"
                        />
                        <button
                            onClick={handleSendMessage}
                            className="bg-gradient-to-r from-purple-500 to-blue-500 hover:from-purple-600 hover:to-blue-600 text-white px-6 py-2 rounded-full font-bold text-sm transition-all transform hover:scale-110 shadow-lg"
                        >
                            📤 Gửi
                        </button>
                    </div>
                </div>
            );
        }

        function FreshKeepApp() {
            const [items, setItems] = useState(initialFoodItems);
            const [showAIChat, setShowAIChat] = useState(false);

            return (
                <div className="min-h-screen p-6 bg-gradient-to-br from-yellow-50/50 via-orange-50/30 to-pink-50/40">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-8">
                            <h1 className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 via-blue-600 to-cyan-500 mb-2">
                                🧊 FreshKeep Smart Fridge
                            </h1>
                            <p className="text-gray-600 text-lg font-semibold">Quản lý tủ lạnh thông minh với AI - Gợi ý công thức & Lập kế hoạch ăn uống</p>
                        </div>

                        {/* Main Content */}
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            {/* Current Items List */}
                            <div className="lg:col-span-1 bg-gradient-to-br from-blue-50 to-cyan-50 rounded-3xl border-2 border-blue-300 p-6 h-[500px] overflow-y-auto shadow-lg hover:shadow-xl transition-all">
                                <h2 className="text-xl font-black text-blue-900 mb-4 sticky top-0 bg-gradient-to-r from-blue-50 to-cyan-50 pb-2">📦 Nguyên liệu hiện có</h2>
                                <div className="space-y-2">
                                    {items.map(item => {
                                        const expiry = ExpiryEngine.calculate(item);
                                        return (
                                            <div key={item.id} className={`p-3 rounded-xl border-l-4 ${expiry.badgeStyle.bgColor} ${expiry.badgeStyle.borderColor} shadow-sm hover:shadow-md transition-all transform hover:scale-105`}>
                                                <p className="font-bold text-sm text-gray-900">{item.name}</p>
                                                <p className={`text-xs font-bold ${expiry.badgeStyle.textColor}`}>{expiry.label}</p>
                                                <p className="text-xs text-gray-600">SL: {item.quantity}</p>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* AI Chat Box - Main Feature */}
                            <div className="lg:col-span-3 h-[500px]">
                                {showAIChat ? (
                                    <AIRecipeChatBox items={items} />
                                ) : (
                                    <div className="bg-gradient-to-br from-purple-100 via-blue-100 to-cyan-100 rounded-3xl border-4 border-dashed border-purple-400 h-full flex flex-col items-center justify-center p-8 text-center shadow-2xl hover:shadow-3xl transition-all">
                                        <div className="text-7xl mb-4 animate-bounce">🤖</div>
                                        <h3 className="text-3xl font-black text-purple-800 mb-3">AI Chef Assistant</h3>
                                        <p className="text-gray-700 mb-6 max-w-md leading-relaxed">
                                            Bật AI để nhận <span className="font-bold text-purple-800">gợi ý công thức</span>, <span className="font-bold text-blue-800">phân tích dinh dưỡng</span> chi tiết và <span className="font-bold text-cyan-800">lập kế hoạch ăn uống tuần</span> dựa trên nguyên liệu sắp hết hạn
                                        </p>
                                        <button
                                            onClick={() => setShowAIChat(true)}
                                            className="bg-gradient-to-r from-purple-500 via-blue-500 to-cyan-500 hover:from-purple-600 hover:via-blue-600 hover:to-cyan-600 text-white px-10 py-4 rounded-full font-black text-lg transition-all transform hover:scale-110 shadow-xl hover:shadow-2xl"
                                        >
                                            💬 Bật AI Assistant
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<FreshKeepApp />, document.getElementById('root'));
    </script>
</body>
</html>
