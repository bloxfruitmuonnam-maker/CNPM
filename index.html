<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshKeep - Hệ thống Giám sát & Quản lý Tủ lạnh Thông minh</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js" crossorigin></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #FFFDF9 0%, #FFF3DA 40%, #E6FFFA 100%);
            overflow-x: hidden;
        }
        /* Hoạt họa bồng bềnh tự nhiên */
        .floating-food {
            animation: float-animation 6s ease-in-out infinite;
            user-select: none;
            pointer-events: none;
        }
        @keyframes float-animation {
            0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
            50% { transform: translateY(-18px) rotate(10deg) scale(1.05); }
        }
        /* Hiệu ứng nhấp nháy cảnh báo động nguy hiểm */
        .alert-pulse {
            animation: pulse-glow 2.5s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.97); box-shadow: 0 0 15px rgba(239, 68, 68, 0.55); }
        }
        /* Ẩn thanh cuộn trình duyệt */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        /* ==========================================================
           1. DATA LAYER: DANH MỤC CHUẨN & DỮ LIỆU BAN ĐẦU (MOCK DB)
           ========================================================= */
        const initialFoodItems = [
            { id: '1', name: 'Sữa tươi TH True Milk', quantity: '2 hộp 1L', category: 'Sữa & Đồ hộp', compartment: 'Cánh tủ', expiryDate: new Date(Date.now() + 6 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false },
            { id: '2', name: 'Thịt bò Mỹ phi lê', quantity: '500g', category: 'Thịt & Hải sản', compartment: 'Ngăn đông', expiryDate: new Date(Date.now() + 15 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false },
            { id: '3', name: 'Ức gà phi lê', quantity: '1kg', category: 'Thịt & Hải sản', compartment: 'Ngăn đông', expiryDate: new Date(Date.now() + 2 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false },
            { id: '4', name: 'Ớt chuông đỏ', quantity: '3 quả', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', expiryDate: new Date(Date.now() + 1 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false },
            { id: '5', name: 'Sữa bột ăn dặm cho bé', quantity: '1 hộp', category: 'Sữa & Đồ hộp', compartment: 'Ngăn đồ ăn dặm', expiryDate: new Date(Date.now() + 1 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: true, isCustom: false },
            { id: '6', name: 'Hành tây', quantity: '2 củ', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', expiryDate: new Date(Date.now() + 8 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false },
            { id: '7', name: 'Bông cải xanh', quantity: '1 cây', category: 'Rau củ & Trái cây', compartment: 'Ngăn mát', expiryDate: new Date(Date.now() + 1 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], isPediatricCritical: false, isCustom: false }
        ];

        const monthlyHistoryData = [
            { month: 'Tháng 3', consumed: 72, wasted: 28 },
            { month: 'Tháng 4', consumed: 80, wasted: 20 },
            { month: 'Tháng 5', consumed: 88, wasted: 12 },
            { month: 'Tháng 6', consumed: 92, wasted: 8 }
        ];

        const RecipeCatalog = [
            { name: 'Gà xào sả ớt', requiredIngredients: ['gà', 'sả', 'ớt'], desc: 'Món ăn đậm đà đưa cơm từ thịt gà thơm phức xào cay nồng.' },
            { name: 'Gà xào ớt chuông và hành tây', requiredIngredients: ['gà', 'ớt chuông', 'hành tây'], desc: 'Hương vị giòn ngọt thanh mát, dồi dào vitamin.' },
            { name: 'Súp gà nấm', requiredIngredients: ['gà', 'nấm'], desc: 'Món súp bồi bổ ấm nóng, dễ tiêu hóa cho cả em bé và gia đình.' },
            { name: 'Bò lúc lắc', requiredIngredients: ['bò', 'hành tây', 'ớt chuông'], desc: 'Thịt bò xào mềm ngon thấm vị cùng hành tây giòn ngọt.' },
            { name: 'Bò bít tết kèm khoai tây', requiredIngredients: ['bò', 'khoai tây'], desc: 'Món Âu sang trọng bổ dưỡng ăn kèm khoai tây chiên giòn rụm.' },
            { name: 'Canh thịt bò hầm khoai tây cà rốt', requiredIngredients: ['bò', 'khoai tây', 'cà rốt'], desc: 'Món canh bổ dưỡng hầm nhừ ngọt nước thích hợp cho gia đình.' },
            { name: 'Lẩu hải sản Thái Lan', requiredIngredients: ['tôm', 'mực', 'nghêu'], desc: 'Chua cay sảng khoái tụ tập họp mặt gia đình cuối tuần.' },
            { name: 'Hải sản xào thập cẩm', requiredIngredients: ['mực', 'tôm', 'súp lơ', 'cà rốt', 'bông cải'], desc: 'Hải sản xào thập cẩm đầy màu sắc dinh dưỡng cân đối.' },
            { name: 'Trứng cuộn phô mai', requiredIngredients: ['trứng', 'bơ', 'sữa', 'phô mai'], desc: 'Món mềm xốp béo ngậy cực kỳ yêu thích của trẻ nhỏ.' },
            { name: 'Bánh nướng bơ trứng', requiredIngredients: ['trứng', 'bơ', 'sữa'], desc: 'Bánh nướng bơ trứng đơn giản, tiện lợi cho bữa sáng.' },
            { name: 'Cơm chiên Dương Châu', requiredIngredients: ['trứng', 'cơm', 'xúc xích'], desc: 'Hạt cơm săn chắc kết hợp cùng xúc xích và trứng chiên giòn thơm.' }
        ];

        const BasicDishes = [
            { name: 'Canh sườn hầm củ quả', category: 'Các món canh', desc: 'Canh sườn hầm ngọt thanh cùng khoai tây, cà rốt.' },
            { name: 'Canh chua cá lóc', category: 'Các món canh', desc: 'Món canh chua đậm đà Nam Bộ giải nhiệt mùa hè.' },
            { name: 'Canh cua rau đay', category: 'Các món canh', desc: 'Canh cua đồng thanh mát ăn kèm cà pháo giòn.' },
            { name: 'Thịt kho tàu', category: 'Các món mặn', desc: 'Thịt kho nước dừa rục mềm cùng trứng vịt.' },
            { name: 'Cá kho tộ', category: 'Các món mặn', desc: 'Cá lóc kho tộ sền sệt, đậm đà vị tiêu ớt.' },
            { name: 'Thịt ba chỉ rim mắm ruốc', category: 'Các món mặn', desc: 'Hương vị cay nồng, mặn ngọt cực kỳ đưa cơm.' },
            { name: 'Cánh gà chiên nước mắm', category: 'Các món mặn', desc: 'Vỏ ngoài giòn, ngập trong nước sốt tỏi mắm ngọt.' },
            { name: 'Sườn xào chua ngọt', category: 'Các món mặn', desc: 'Sườn non rim sốt chua ngọt hài hòa.' }
        ];

        /* ==========================================================
           2. APPLICATION LAYER: DOMAIN LOGIC SERVICES
           ========================================================== */

        // 2.1. Notification Engine: Đảm bảo hoạt động an toàn bất kể chính sách bảo mật trình duyệt
        const NotificationEngine = {
            isSupported: () => {
                return ('Notification' in window) && window.isSecureContext;
            },

            getPermissionState: () => {
                if (!NotificationEngine.isSupported()) return 'unsupported';
                return Notification.permission;
            },

            requestPermission: () => {
                if (!NotificationEngine.isSupported()) return Promise.resolve(false);
                
                try {
                    return Notification.requestPermission().then(permission => {
                        return permission === 'granted';
                    });
                } catch (e) {
                    return new Promise((resolve) => {
                        try {
                            Notification.requestPermission(permission => {
                                resolve(permission === 'granted');
                            });
                        } catch (err) {
                            console.error("Lỗi khi cấp quyền thông báo đẩy:", err);
                            resolve(false);
                        }
                    });
                }
            },

            sendPush: (title, body, fallbackCallback) => {
                if (NotificationEngine.isSupported() && Notification.permission === 'granted') {
                    try {
                        new Notification(title, {
                            body: body,
                            icon: 'https://cdn-icons-png.flaticon.com/512/1157/1157109.png'
                        });
                        return true;
                    } catch (e) {
                        console.warn("Gửi thông báo Native thất bại, chuyển sang phương thức nội bộ:", e);
                    }
                }
                if (fallbackCallback) {
                    fallbackCallback(title, body);
                }
                return false;
            },

            triggerPersonaPush: (itemName, daysRemaining, category, fallbackCallback) => {
                let title = "🚨 FRESHKEEP - CẢNH BÁO HẠN DÙNG";
                let body = "";

                if (category === "Sữa & Đồ hộp" && itemName.toLowerCase().includes("em bé")) {
                    title = "⚠️ Cảnh báo nghiêm ngặt";
                    body = `Đồ ăn dặm của bé Mai chỉ còn ${daysRemaining} ngày hạn dùng. Hãy ưu tiên chế biến cho bé ngay! 👶`;
                } else if (itemName.toLowerCase().includes("cá hồi") || itemName.toLowerCase().includes("bò")) {
                    title = "🆘 Nấu ngay kẻo phí!";
                    body = `Món ngon "${itemName}" trong tủ sẽ hết hạn sau ${daysRemaining} ngày. Đừng để lãng phí nhé Thảo! 💸`;
                } else {
                    body = `Thực phẩm "${itemName}" sắp hết hạn sau ${daysRemaining} ngày. Vui lòng kiểm tra và chế biến kịp thời!`;
                }

                NotificationEngine.sendPush(title, body, fallbackCallback);
            }
        };

        // 2.2. Expiry Engine: Thiết lập các mức cảnh báo chi tiết
        const ExpiryEngine = {
            calculate: (item, warnDaysLimit = 3, pediatricWarnLimit = 2) => {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const expiry = new Date(item.expiryDate);
                expiry.setHours(0, 0, 0, 0);

                const diffTime = expiry.getTime() - today.getTime();
                const daysRemaining = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (daysRemaining < 0) {
                    return {
                        label: 'ĐÃ HẾT HẠN 🔴',
                        badgeStyle: { textColor: 'text-red-700', bgColor: 'bg-red-50', borderColor: 'border-red-200' },
                        sideColor: 'bg-red-500',
                        isPulse: true,
                        daysRemaining
                    };
                }

                if ((item.isPediatricCritical || item.compartment === 'Ngăn đồ ăn dặm') && daysRemaining <= pediatricWarnLimit) {
                    return {
                        label: `NGUY HIỂM: ĐỒ CỦA BÉ (${daysRemaining} ngày) 👶🚨`,
                        badgeStyle: { textColor: 'text-red-600', bgColor: 'bg-red-100', borderColor: 'border-red-400 font-black' },
                        sideColor: 'bg-red-600 alert-pulse',
                        isPulse: true,
                        daysRemaining
                    };
                }

                if (daysRemaining <= warnDaysLimit) {
                    return {
                        label: `SẮP HẾT HẠN (${daysRemaining} ngày) 🟡`,
                        badgeStyle: { textColor: 'text-orange-700', bgColor: 'bg-orange-50', borderColor: 'border-orange-200' },
                        sideColor: 'bg-orange-400',
                        isPulse: true,
                        daysRemaining
                    };
                }

                return {
                    label: 'TƯƠI MỚI 🟢',
                    badgeStyle: { textColor: 'text-emerald-700', bgColor: 'bg-emerald-50', borderColor: 'border-emerald-200' },
                    sideColor: 'bg-emerald-400',
                    isPulse: false,
                    daysRemaining
                };
            },

            getFallbackDays: (name, category, compartment) => {
                const n = name.toLowerCase();
                const c = compartment ? compartment.toLowerCase() : 'ngăn mát';

                if (category === 'Thịt & Hải sản' || n.includes('thịt') || n.includes('cá') || n.includes('tôm') || n.includes('mực') || n.includes('gà') || n.includes('vịt')) {
                    if (c.includes('đông')) {
                        if (n.includes('heo') || n.includes('lợn') || n.includes('ba chỉ') || n.includes('sườn')) return 150;
                        if (n.includes('bò xay')) return 105;
                        if (n.includes('bò')) return 270;
                        if (n.includes('gà') || n.includes('vịt') || n.includes('ức') || n.includes('đùi') || n.includes('cánh')) return 315;
                        if (n.includes('hồi') || n.includes('thu')) return 75;
                        if (n.includes('tôm') || n.includes('mực') || n.includes('nghêu') || n.includes('sò')) return 135;
                        return 90;
                    }
                    return 3;
                }

                if (category === 'Rau củ & Trái cây' || n.includes('rau') || n.includes('quả') || n.includes('trái cây') || n.includes('táo') || n.includes('cam')) {
                    if (n.includes('xà lách') || n.includes('muống') || n.includes('thìa') || n.includes('cải') || n.includes('bó xôi')) return 5;
                    if (n.includes('cà rốt') || n.includes('cà chua') || n.includes('ớt chuông')) return 10;
                    if (n.includes('hành lá') || n.includes('sả') || n.includes('ớt') || n.includes('tỏi') || n.includes('gừng')) return 10;
                    if (n.includes('táo') || n.includes('cam') || n.includes('chanh')) return 10;
                    return 7;
                }

                if (category === 'Sữa & Đồ hộp' || n.includes('sữa') || n.includes('bơ') || n.includes('phô mai') || n.includes('tương')) {
                    if (n.includes('sữa tươi')) return 8;
                    if (n.includes('sữa chua')) return 10;
                    if (n.includes('phô mai')) return 10;
                    if (n.includes('bơ')) return 60;
                    if (n.includes('mayonnaise') || n.includes('tương cà') || n.includes('tương ớt') || n.includes('sốt')) return 180;
                    return 10;
                }

                if (category === 'Đồ khô & Chế biến sẵn' || n.includes('xúc xích') || n.includes('thịt xông khói') || n.includes('mì') || n.includes('bún')) {
                    if (n.includes('xúc xích')) {
                        return c.includes('đông') ? 45 : 10; 
                    }
                    if (n.includes('xông khói')) {
                        return c.includes('đông') ? 30 : 7;
                    }
                    if (n.includes('mì') || n.includes('bún') || n.includes('phở')) return 365;
                    return 30;
                }

                if (category === 'Đồ uống' || n.includes('nước ép') || n.includes('nước ngọt') || n.includes('bia')) {
                    if (n.includes('nước ép')) return 8;
                    if (n.includes('nước ngọt')) return 180;
                    if (n.includes('bia')) return 210;
                    return 90;
                }

                return 5;
            },

            getHealthWarning: (name) => {
                const n = name.toLowerCase();
                if (n.includes('khoai tây') || n.includes('hành tây')) {
                    return '⚠️ Cảnh báo sức khỏe: Khoai tây và Hành tây không nên bảo quan trong tủ lạnh vì dễ bị mọc mầm, ẩm mốc và biến đổi tinh bột thành các chất không có lợi cho sức khỏe.';
                }
                if (n.includes('chuối')) {
                    return '⚠️ Lưu ý bảo quản: Chuối nên được treo bảo quản ở nhiệt độ phòng. Nhiệt độ tủ lạnh sẽ khiến chuối nhanh bị thâm đen và mất vị ngọt tự nhiên.';
                }
                return null;
            }
        };

        // 2.3. Recipe Engine: Phân tích & Đề xuất công thức dành riêng cho nguyên liệu lạ
        const RecipeEngine = {
            generateForCustomIngredient: (itemName) => {
                const name = itemName.trim();
                const lower = name.toLowerCase();
                
                if (lower.includes('đông trùng') || lower.includes('linh chi') || lower.includes('sâm') || lower.includes('thảo dược')) {
                    return [
                        { name: `Canh gà ta hầm sâm bổ lượng & ${name}`, desc: `Hầm gà cùng ${name}, hạt sen, táo đỏ và kỳ tử trong 1.5 giờ. Thích hợp bồi bổ sức khỏe cho gia đình.` },
                        { name: `Trà thảo mộc dưỡng nhan từ ${name}`, desc: `Hãm lát ${name} với nước sôi 85°C kèm kỷ tử và một chút đường phèn thanh mát.` }
                    ];
                }
                if (lower.includes('ốc') || lower.includes('nghêu') || lower.includes('hàu') || lower.includes('sò') || lower.includes('bào ngư')) {
                    return [
                        { name: `${name} hấp sả ớt cay nồng`, desc: `Hấp cách thủy ${name} cùng sả cây đập dập, gừng thái chỉ và ớt tươi. Chấm kèm nước mắm gừng ấm bụng.` },
                        { name: `Cháo bổ dưỡng hầm ${name} đậu xanh`, desc: `Nấu cháo nhừ cùng đậu xanh vỏ, sau đó xào chín ${name} với hành tỏi rồi trút vào nồi cháo.` }
                    ];
                }
                if (lower.includes('măng') || lower.includes('nấm') || lower.includes('sen') || lower.includes('mộc nhĩ')) {
                    return [
                        { name: `${name} xào tỏi dầu hào chay`, desc: `Xào nhanh tay ${name} trên lửa lớn với tỏi băm và dầu hào để giữ độ giòn ngọt tự nhiên.` },
                        { name: `Canh sườn heo hầm ${name}`, desc: `Ninh sườn non lấy nước ngọt, cho thêm ${name} hầm chín tới, rắc hành lá và tiêu thơm.` }
                    ];
                }
                if (lower.includes('phô mai') || lower.includes('bơ') || lower.includes('sốt')) {
                    return [
                        { name: `Bánh mì nướng sốt ${name}`, desc: `Phết một lớp ${name} mỏng lên bánh mì, thêm một chút trứng hoặc xúc xích rồi nướng giòn.` },
                        { name: `Mì Ý sốt kem béo ngậy với ${name}`, desc: `Luộc mì Ý dai vừa chín, đảo đều cùng sốt kem, tỏi băm và lớp ${name} tan chảy mịn màng.` }
                    ];
                }
                // Các gợi ý mặc định linh hoạt cho mọi nguyên liệu lạ khác
                return [
                    { 
                        name: `${name} xào tỏi ớt thập cẩm`, 
                        desc: `Tận dụng các loại rau củ sẵn có trong ngăn mát, xào nhanh tay ${name} trên lửa lớn với tỏi phi thơm để giữ vị giòn dai.` 
                    },
                    { 
                        name: `Canh súp thanh nhiệt cùng ${name}`, 
                        desc: `Kết hợp ${name} với một ít sườn non hoặc tôm khô để tạo nước dùng ngọt tự nhiên, dùng kèm hành lá thơm nhẹ.` 
                    }
                ];
            }
        };

        // 2.4. FridgyParser: Bộ phân tách cú pháp NLP thông minh đa lớp câu lệnh
        const FridgyParser = {
            categoryKeywords: {
                'Thịt & Hải sản': ['thịt', 'bò', 'heo', 'gà', 'cá', 'tôm', 'mực', 'sườn', 'ba chỉ', 'bắp bò', 'gân bò', 'cá hồi'],
                'Rau củ & Trái cây': ['rau', 'cải', 'cà rốt', 'khoai', 'cà chua', 'hành', 'ớt', 'tỏi', 'gừng', 'sả', 'táo', 'chuối', 'cam', 'chanh', 'bông cải', 'súp lơ'],
                'Sữa & Đồ hộp': ['sữa', 'trứng', 'phô mai', 'bơ', 'mayonnaise', 'tương', 'đồ hộp', 'sữa chua'],
                'Đồ khô & Chế biến sẵn': ['xúc xích', 'thịt xông khói', 'mì', 'bún', 'phở', 'chà bông', 'ruốc'],
                'Đồ uống': ['nước ép', 'nước ngọt', 'bia', 'coca', 'pepsi', 'trà']
            },

            // Hàm kiểm tra nhanh nguyên liệu lạ (nằm ngoài danh mục chuẩn)
            isCustomIngredient: (name) => {
                const n = name.toLowerCase();
                for (const [cat, keywords] of Object.entries(FridgyParser.categoryKeywords)) {
                    if (keywords.some(keyword => n.includes(keyword))) {
                        return false; // Trùng từ khóa danh mục chuẩn
                    }
                }
                return true; // Hoàn toàn không khớp từ khóa nào -> Nguyên liệu lạ
            },

            parseInstruction: (input, itemsList) => {
                const rawText = input.trim();
                const normalized = rawText.toLowerCase();

                // TRUY VẤN VÀ CÂU HỎI TRẠNG THÁI (QUERIES)
                if (normalized.includes('sắp hết hạn') || normalized.includes('sắp hỏng')) {
                    const expiring = itemsList.filter(item => ExpiryEngine.calculate(item).daysRemaining <= 3);
                    if (expiring.length === 0) return { success: false, message: 'Fridgy AI: Tuyệt vời! Hiện tại không có thực phẩm nào trong tủ sắp hết hạn.' };
                    const names = expiring.map(i => `${i.name} (Hạn: ${i.expiryDate})`).join(', ');
                    return { success: false, message: `Fridgy AI: Phát hiện các thực phẩm sắp hết hạn gấp: [ ${names} ]. Bạn nên ưu tiên nấu sớm.` };
                }

                if (normalized.includes('trứng gà còn bao nhiêu ngày')) {
                    const found = itemsList.find(i => i.name.toLowerCase().includes('trứng'));
                    if (found) {
                        const days = ExpiryEngine.calculate(found).daysRemaining;
                        return { success: false, message: `Fridgy AI: Trứng gà tươi hiện còn lại đúng ${days} ngày nữa là đạt giới hạn sử dụng bảo quản.` };
                    }
                    return { success: false, message: `Fridgy AI: Không tìm thấy trứng gà trong tủ lạnh của bạn.` };
                }

                if (normalized.includes('còn') && normalized.includes('không')) {
                    const searchedWord = normalized.replace('trong tủ', '').replace('còn', '').replace('không', '').replace('fridgy', '').replace('?', '').trim();
                    const found = itemsList.find(i => i.name.toLowerCase().includes(searchedWord));
                    if (found) {
                        return { success: false, message: `Fridgy AI: Có nhé! Món "${found.name}" vẫn còn trong tủ với số lượng: ${found.quantity} (${found.compartment}).` };
                    }
                    return { success: false, message: `Fridgy AI: Tiếc quá, hệ thống ghi nhận trong tủ đã hết "${searchedWord}". Bạn có muốn thêm vào danh sách đi chợ không?` };
                }

                if (normalized.includes('liệt kê') || normalized.includes('có gì')) {
                    const compMatch = normalized.includes('đông') ? 'Ngăn đông' : normalized.includes('dặm') ? 'Ngăn đồ ăn dặm' : normalized.includes('cánh') ? 'Cánh tủ' : 'Ngăn mát';
                    const matchedItems = itemsList.filter(i => i.compartment === compMatch);
                    if (matchedItems.length === 0) return { success: false, message: `Fridgy AI: Vùng lưu trữ ${compMatch} hiện đang trống.` };
                    return { success: false, message: `Fridgy AI: Các thực phẩm đang ở ${compMatch}: ${matchedItems.map(i => i.name).join(', ')}.` };
                }

                if (normalized.includes('trạng thái của')) {
                    const cleaned = normalized.replace('trạng thái của', '').replace('như thế nào', '').replace('?', '').trim();
                    const found = itemsList.find(i => i.name.toLowerCase().includes(cleaned));
                    if (found) {
                        const expiry = ExpiryEngine.calculate(found);
                        return { success: false, message: `Fridgy AI: Món "${found.name}" đang được lưu trữ ở ${found.compartment} với trạng thái: [${expiry.label}].` };
                    }
                    return { success: false, message: `Fridgy AI: Không tìm thấy thực phẩm "${cleaned}" trong hệ thống tủ lạnh của bạn.` };
                }

                // CÁC CÂU LỆNH GỢI Ý MÓN ĂN & THỰC ĐƠN THÔNG MINH
                if (normalized.includes('tôi nên nấu gì với') && normalized.includes('sắp hết hạn')) {
                    return { success: false, message: 'Fridgy AI gợi ý: Với thịt bò (hoặc thịt heo) và bông cải xanh sắp hết hạn, bạn hãy thực hiện món "Bò lúc lắc hành tây" hoặc "Hải sản/Thịt bò xào bông cải xanh thập cẩm" giòn ngọt để giải phóng nguyên liệu nhanh gọn nhé.' };
                }

                if (normalized.includes('gợi ý cho tôi một món ăn tiết kiệm')) {
                    return { success: false, message: 'Fridgy AI: Dựa trên nguồn nguyên liệu sẵn có, tôi gợi ý cho tối nay món "Gà xào ớt chuông và hành tây" - Bạn đang có sẵn Ức gà phi lê, Ớt chuông đỏ và Hành tây sắp đến hạn chế biến trong ngăn mát!' };
                }

                if (normalized.includes('chồng tôi') || normalized.includes('chia sẻ')) {
                    return { success: false, message: 'Fridgy AI: Tài khoản tủ lạnh đang được chia sẻ đồng bộ trực tiếp với Chồng (Bố trẻ nhỏ) và Trần Thu Thảo. Mọi thay đổi sẽ hiển thị ngay lập tức.' };
                }

                if (normalized.includes('báo cáo') || normalized.includes('vứt bỏ') || normalized.includes('lãng phí')) {
                    return { success: false, message: 'Fridgy AI: Tháng này bạn đã sử dụng tốt 92% thực phẩm lưu trữ, chỉ vứt bỏ khoảng 8% (Chủ yếu là rau củ bị quên góc ngăn mát). Hãy tối ưu hóa bằng cách đặt thông báo sớm!' };
                }

                if (normalized.includes('lời khuyên') || normalized.includes('tiết kiệm')) {
                    return { success: false, message: 'Fridgy AI mách nhỏ: Chia nhỏ khẩu phần thịt trữ ngăn đông, bọc màng thực phẩm cho rau xanh, và sử dụng tab "Thực đơn" để cứu hộ đồ sắp hết hạn.' };
                }

                if (normalized.includes('cảnh báo tôi trước 2 ngày')) {
                    return { success: false, message: 'Fridgy AI: Đã cập nhật chế độ giám sát nhi đồng nghiêm ngặt! Hệ thống sẽ kích hoạt báo động Đỏ nhấp nháy khẩn cấp trước 2 ngày đối với tất cả đồ của bé.' };
                }

                if (normalized.startsWith('xóa món') || normalized.startsWith('xóa')) {
                    const targetName = normalized.replace('xóa món', '').replace('xóa', '').replace('khỏi danh sách', '').trim();
                    const found = itemsList.find(i => i.name.toLowerCase().includes(targetName));
                    if (found) {
                        return {
                            success: true,
                            action: 'delete',
                            targetId: found.id,
                            message: `Fridgy AI: Đã tiến hành xóa thực phẩm "${found.name}" thành công khỏi tủ lạnh.`
                        };
                    }
                    return { success: false, message: `Fridgy AI: Không tìm thấy thực phẩm nào khớp với tên "${targetName}" để xóa.` };
                }

                if (normalized.startsWith('sửa số lượng') || normalized.startsWith('sửa')) {
                    const updateRegex = /(?:sửa\s+số\s+lượng\s+|sửa\s+)(.+?)\s+thành\s+(.+)$/i;
                    const updateMatch = rawText.match(updateRegex);
                    if (updateMatch) {
                        const targetName = updateMatch[1].trim().toLowerCase();
                        const newQty = updateMatch[2].trim();
                        const found = itemsList.find(i => i.name.toLowerCase().includes(targetName));
                        if (found) {
                            return {
                                success: true,
                                action: 'update',
                                targetId: found.id,
                                newQuantity: newQty,
                                message: `Fridgy AI: Đã chỉnh sửa thành công số lượng món "${found.name}" thành [${newQty}].`
                            };
                        }
                    }
                    return { success: false, message: 'Fridgy AI: Sai cú pháp chỉnh sửa. Cú pháp đúng: "Sửa số lượng sữa tươi thành 2 hộp".' };
                }

                const triggerKeywords = ['thêm', 'bỏ', 'cất', 'mua', 'để'];
                const hasTrigger = triggerKeywords.some(keyword => normalized.startsWith(keyword));

                if (!hasTrigger) {
                    return {
                        success: false,
                        message: 'Fridgy AI: Vui lòng nhập câu lệnh dạng: "Thêm [số lượng] [tên thực phẩm] vào [ngăn mát/đông/đồ ăn dặm/cánh tủ]"'
                    };
                }

                const structureRegex = /(?:thêm|bỏ|cất|mua|để)\s+(.+?)\s+vào\s+(ngăn mát|ngăn đông|cánh tủ|ngăn đồ ăn dặm)/i;
                const match = rawText.match(structureRegex);

                if (!match) {
                    return {
                        success: false,
                        message: 'Fridgy AI: Tôi chưa khớp được vị trí cất giữ. Hãy ghi rõ: "... vào ngăn mát/ngăn đông/cánh tủ/ngăn đồ ăn dặm".'
                    };
                }

                const itemSegment = match[1].trim();
                const compartmentSegment = match[2].trim().toLowerCase();

                const qtyRegex = /^(\d+\s*[a-zA-Zà-ỹÀ-Ỹ\s]+|\d+)\s+(.+)$/i;
                const qtyMatch = itemSegment.match(qtyRegex);

                let quantity = '1 phần';
                let name = itemSegment;

                if (qtyMatch) {
                    quantity = qtyMatch[1].trim();
                    name = qtyMatch[2].trim();
                }

                let compartment = 'Ngăn mát';
                if (compartmentSegment.includes('đông')) compartment = 'Ngăn đông';
                if (compartmentSegment.includes('cánh')) compartment = 'Cánh tủ';
                if (compartmentSegment.includes('dặm')) compartment = 'Ngăn đồ ăn dặm';

                let category = 'Khác';
                const nameLower = name.toLowerCase();

                for (const [cat, keywords] of Object.entries(FridgyParser.categoryKeywords)) {
                    if (keywords.some(keyword => nameLower.includes(keyword))) {
                        category = cat;
                        break;
                    }
                }

                const isStrangeIngredient = category === 'Khác' || FridgyParser.isCustomIngredient(name);

                const fallbackDays = ExpiryEngine.getFallbackDays(name, category, compartment);
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + fallbackDays);
                const expiryDate = targetDate.toISOString().split('T')[0];

                const healthWarn = ExpiryEngine.getHealthWarning(name);
                const warningSuffix = healthWarn ? `\n\n⚠️ Chú ý: ${healthWarn}` : '';

                const parsedItem = {
                    name: name.charAt(0).toUpperCase() + name.slice(1),
                    quantity,
                    category: isStrangeIngredient ? 'Khác' : category,
                    compartment,
                    expiryDate,
                    isPediatricCritical: compartment === 'Ngăn đồ ăn dặm',
                    isCustom: isStrangeIngredient
                };

                if (isStrangeIngredient) {
                    return {
                        success: true,
                        action: 'strange_confirmation',
                        message: `Fridgy AI phát hiện "${parsedItem.name}" là một Nguyên liệu lạ (không thuộc danh mục chuẩn). Đang kích hoạt Trình cấu hình wizard bảo quản...`,
                        parsedItem
                    };
                }

                return {
                    success: true,
                    action: 'add',
                    message: `Fridgy AI: Đã nhận dạng thành công và tự động phân loại [${category}] -> Lưu trữ tại ${compartment}. Đã kích hoạt thời hạn bảo quản lý tưởng (${fallbackDays} ngày).${warningSuffix}`,
                    parsedItem
                };
            }
        };

        /* ==========================================================
           3. PRESENTATION LAYER: REACT DASHBOARD & CONTROLLER
           ========================================================== */
        function FreshKeepApp() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [authMode, setAuthMode] = useState('login');
            const [userName, setUserName] = useState('Nguyễn Thị Mai');

            const [items, setItems] = useState(initialFoodItems);
            const [searchQuery, setSearchQuery] = useState('');
            const [activeTab, setActiveTab] = useState('storage'); 
            const [activeCompartment, setActiveCompartment] = useState('Tất cả');

            // Quản lý kết nối mạng thực tế
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [offlineQueue, setOfflineQueue] = useState([]);

            // Lưu trữ quyền thông báo đẩy hiện tại của trình duyệt
            const [notificationPermission, setNotificationPermission] = useState(NotificationEngine.getPermissionState());
            
            // Hộp đệm lưu danh sách cảnh báo đẩy mô phỏng (In-App Push Fallback Card) khi permission bị Denied - HIỂN THỊ GÓC TRÊN BÊN PHẢI
            const [inAppNotifications, setInAppNotifications] = useState([]);

            // Lưu trữ trạng thái trung gian xử lý "Nguyên liệu lạ"
            const [strangeItemToConfirm, setStrangeItemToConfirm] = useState(null);

            const [tempCooler, setTempCooler] = useState(4); 
            const [tempFreezer, setTempFreezer] = useState(-18); 
            const [warnDaysLimit, setWarnDaysLimit] = useState(3); 
            const [pediatricWarnLimit, setPediatricWarnLimit] = useState(2); 

            const [currentTime, setCurrentTime] = useState(new Date());
            const [coolerSensorTemp, setCoolerSensorTemp] = useState(4.0);
            const [freezerSensorTemp, setFreezerSensorTemp] = useState(-18.0);
            
            // Nhật ký thời gian thực (chỉ cập nhật dựa trên tương tác thật của người dùng)
            const [liveActivityToast, setLiveActivityToast] = useState(null);

            const [chatInput, setChatInput] = useState('');
            const [chatHistory, setChatHistory] = useState([
                { sender: 'fridgy', text: 'Chào bạn! Tôi là trợ lý ảo Fridgy 🤖. Hãy chọn các câu lệnh mẫu nhanh bên phải hoặc gõ tự do vào ô nhập bên dưới để ra lệnh nhé!' }
            ]);

            const [showAddModal, setShowAddModal] = useState(false);
            const [newFood, setNewFood] = useState({ name: '', quantity: '', category: 'Thịt & Hải sản', compartment: 'Ngăn mát', expiryDate: '', isPediatricCritical: false, isCustom: false });

            const [healthNotice, setHealthNotice] = useState(null);

            const [roommates, setRoommates] = useState([
                { name: 'Nguyễn Thị Mai', avatar: '👩‍🍼', role: 'Mẹ bỉm sữa' },
                { name: 'Trần Thu Thảo', avatar: '👩‍🎓', role: 'Sinh viên' },
                { name: 'Bố trẻ nhỏ', avatar: '🙋‍♂️', role: 'Chồng' }
            ]);
            const [inviteName, setInviteName] = useState('');
            const [testResults, setTestResults] = useState(null);

            // Cấu trúc Tab điều hướng
            const tabs = [
                { id: 'storage', label: '📦 Kho thực phẩm' },
                { id: 'fridge', label: '🧊 Tủ vật lý', mobileOnly: true },
                { id: 'ai', label: '🤖 Trợ lý AI' },
                { id: 'recipes', label: '📊 Phân tích & Thực đơn' },
                { id: 'settings', label: '⚙️ Cài đặt & Chẩn đoán' }
            ];

            // ==========================================
            // BỘ KÍCH HOẠT THÔNG BÁO NỘI BỘ (FALLBACK TOAST SYSTEM - 5 GIÂY)
            // ==========================================
            const triggerNotification = (title, body) => {
                const id = Date.now();
                setInAppNotifications(prev => [...prev, { id, title, body }]);
                // Tự động đóng thẻ thông báo sau đúng 5 giây
                setTimeout(() => {
                    setInAppNotifications(prev => prev.filter(item => item.id !== id));
                }, 5000);
            };

            // ========================================================
            // HIỆU ỨNG TỰ ĐỘNG ẨN THÔNG BÁO TƯƠNG TÁC THỰC TẾ SAU ĐÚNG 5 GIÂY
            // ========================================================
            useEffect(() => {
                if (liveActivityToast) {
                    const timer = setTimeout(() => {
                        setLiveActivityToast(null);
                    }, 5000); // 5000ms = 5 giây
                    return () => clearTimeout(timer);
                }
            }, [liveActivityToast]);

            // Theo dõi kết nối thực tế
            useEffect(() => {
                const handleOnline = () => {
                    setIsOnline(true);
                    setLiveActivityToast("Đã khôi phục kết nối Internet thực tế. Đang hoạt động trực tuyến.");
                };
                const handleOffline = () => {
                    setIsOnline(false);
                    setLiveActivityToast("Đang hoạt động ngoại tuyến. Các thay đổi sẽ được lưu tạm thời.");
                };

                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                setIsOnline(navigator.onLine);

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            // Đồng bộ hóa ngoại tuyến
            useEffect(() => {
                if (isOnline && offlineQueue.length > 0) {
                    setItems(prev => [...offlineQueue, ...prev]);
                    NotificationEngine.sendPush(
                        "Đã phục hồi Internet! 🟢",
                        `Đồng bộ hóa thành công ${offlineQueue.length} thực phẩm mới từ hàng đợi thiết bị.`,
                        triggerNotification
                    );
                    setOfflineQueue([]);
                }
            }, [isOnline, offlineQueue]);

            // Cập nhật thời gian
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // Mô phỏng biến thiên nhiệt độ cảm biến IoT xung quanh mốc cài đặt
            useEffect(() => {
                const sensorTimer = setInterval(() => {
                    setCoolerSensorTemp((tempCooler + (Math.random() * 0.4 - 0.2)).toFixed(1));
                    setFreezerSensorTemp((tempFreezer + (Math.random() * 0.6 - 0.3)).toFixed(1));
                }, 3000);
                return () => clearInterval(sensorTimer);
            }, [tempCooler, tempFreezer]);

            // Xử lý gửi lệnh chat của người dùng
            const handleSendChat = () => {
                if (!chatInput.trim()) return;

                const userMsg = { sender: 'user', text: chatInput };
                setChatHistory(prev => [...prev, userMsg]);
                const parseText = chatInput;
                setChatInput('');

                setTimeout(() => {
                    const res = FridgyParser.parseInstruction(parseText, items);
                    
                    if (res.success) {
                        if (res.action === 'strange_confirmation') {
                            setStrangeItemToConfirm(res.parsedItem);
                            setChatHistory(prev => [...prev, { sender: 'fridgy', text: res.message }]);
                        } else if (res.action === 'add' && res.parsedItem) {
                            addProcessedFoodItem(res.parsedItem);
                            setChatHistory(prev => [...prev, { sender: 'fridgy', text: res.message }]);
                        } else if (res.action === 'delete' && res.targetId) {
                            const targetItem = items.find(i => i.id === res.targetId);
                            setItems(prev => prev.filter(i => i.id !== res.targetId));
                            setChatHistory(prev => [...prev, { sender: 'fridgy', text: res.message }]);
                            if (targetItem) {
                                setLiveActivityToast(`Đã xóa "${targetItem.name}" thành công qua lệnh trợ lý ảo.`);
                            }
                        } else if (res.action === 'update' && res.targetId) {
                            const targetItem = items.find(i => i.id === res.targetId);
                            setItems(prev => prev.map(i => i.id === res.targetId ? { ...i, quantity: res.newQuantity } : i));
                            setChatHistory(prev => [...prev, { sender: 'fridgy', text: res.message }]);
                            if (targetItem) {
                                setLiveActivityToast(`Đã cập nhật số lượng món "${targetItem.name}" thành [${res.newQuantity}].`);
                            }
                        }
                    } else {
                        setChatHistory(prev => [...prev, { sender: 'fridgy', text: res.message }]);
                    }
                }, 400);
            };

            const handleQuickCommand = (commandText) => {
                setChatInput(commandText);
            };

            // Hàm lưu trữ thực phẩm và kiểm soát nhật ký thực
            const addProcessedFoodItem = (foodItem) => {
                const finalItem = {
                    id: Date.now().toString(),
                    ...foodItem
                };

                const healthWarn = ExpiryEngine.getHealthWarning(foodItem.name);
                if (healthWarn) {
                    setHealthNotice(healthWarn);
                    setTimeout(() => setHealthNotice(null), 8000);
                }

                if (!isOnline) {
                    setOfflineQueue(prev => [finalItem, ...prev]);
                    NotificationEngine.sendPush(
                        "FreshKeep Ngoại tuyến 🔴",
                        `Đã lưu tạm thời "${finalItem.name}" vào bộ nhớ đệm thiết bị cá nhân.`,
                        triggerNotification
                    );
                    setLiveActivityToast(`Đã xếp hàng đợi ngoại tuyến: Thêm món "${finalItem.name}"`);
                } else {
                    setItems(prev => [finalItem, ...prev]);

                    NotificationEngine.sendPush(
                        "Món mới phát hiện! 🎉",
                        `${userName} vừa thêm "${finalItem.name}" (${finalItem.quantity}) vào tủ lạnh gia đình.`,
                        triggerNotification
                    );

                    setLiveActivityToast(`${userName} vừa cất thành công "${finalItem.name}" (${finalItem.quantity}) vào tủ.`);

                    const info = ExpiryEngine.calculate(finalItem, warnDaysLimit, pediatricWarnLimit);
                    if (info.daysRemaining <= warnDaysLimit) {
                        NotificationEngine.triggerPersonaPush(finalItem.name, info.daysRemaining, finalItem.category, triggerNotification);
                    }
                }
            };

            const handleConfirmStrangeIngredient = (confirmedCompartment, expiryDays, isPediatric) => {
                if (!strangeItemToConfirm) return;

                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + Number(expiryDays));

                const updatedStrangeItem = {
                    ...strangeItemToConfirm,
                    compartment: confirmedCompartment,
                    expiryDate: targetDate.toISOString().split('T')[0],
                    isPediatricCritical: isPediatric,
                    isCustom: true
                };

                addProcessedFoodItem(updatedStrangeItem);
                
                setChatHistory(prev => [...prev, { 
                    sender: 'fridgy', 
                    text: `Đã xác nhận nguyên liệu lạ "${updatedStrangeItem.name}" vào ${confirmedCompartment} với thời hạn bảo quản ${expiryDays} ngày.` 
                }]);

            const handleAddManualItem = (e) => {
                e.preventDefault();
                if (!newFood.name || !newFood.quantity) return;

                let targetCategory = newFood.category;
                let isStrange = FridgyParser.isCustomIngredient(newFood.name);

                if (isStrange) {
                    targetCategory = 'Khác';
                } else {
                    const nameLower = newFood.name.toLowerCase();
                    for (const [cat, keywords] of Object.entries(FridgyParser.categoryKeywords)) {
                        if (keywords.some(keyword => nameLower.includes(keyword))) {
                            targetCategory = cat;
                            break;
                        }
                    }
                }

                let finalExpiryDate = newFood.expiryDate;
                if (!finalExpiryDate) {
                    const fallbackDays = ExpiryEngine.getFallbackDays(newFood.name, targetCategory, newFood.compartment);
                    const targetDate = new Date();
                    targetDate.setDate(targetDate.getDate() + fallbackDays);
                    finalExpiryDate = targetDate.toISOString().split('T')[0];
                }

                const manualFoodItem = {
                    name: newFood.name,
                    quantity: newFood.quantity,
                    category: targetCategory,
                    compartment: newFood.compartment,
                    expiryDate: finalExpiryDate,
                    isPediatricCritical: newFood.compartment === 'Ngăn đồ ăn dặm' || newFood.isPediatricCritical,
                    isCustom: isStrange
                };

                if (isStrange) {
                    setStrangeItemToConfirm(manualFoodItem);
                } else {
                    addProcessedFoodItem(manualFoodItem);
                }

                setShowAddModal(false);
                setNewFood({ name: '', quantity: '', category: 'Thịt & Hải sản', compartment: 'Ngăn mát', expiryDate: '', isPediatricCritical: false, isCustom: false });
            };

            const handleDeleteFood = (id) => {
                const target = items.find(item => item.id === id);

            const handleRequestPermissionClick = () => {

                    return matchesSearch && matchesComp;

                const total = items.length;
                const counts = { 'Thịt & Hải sản': 0, 'Rau củ & Trái cây': 0, 'Sữa & Đồ hộp': 0, 'Đồ khô & Chế biến sẵn': 0, 'Đồ uống': 0, 'Khác': 0 };
                items.forEach(i => { if (counts[i.category] !== undefined) counts[i.category]++; else counts['Khác']++; });
                
                const distribution = Object.keys(counts).map(key => ({
                    category: key,
                    percentage: total > 0 ? Math.round((counts[key] / total) * 100) : 0,
                    count: counts[key]
                })).filter(d => d.count > 0);

                return { total, distribution };
            }, [items]);

            const matchedRecipes = useMemo(() => {
                const availableNames = items.map(item => item.name.toLowerCase());
                const criticalIngredients = items
                    .filter(item => ExpiryEngine.calculate(item, warnDaysLimit, pediatricWarnLimit).daysRemaining <= warnDaysLimit)
                    .map(item => item.name.toLowerCase());

                const matched = RecipeCatalog.map(recipe => {
                    let matchCount = 0;
                    let criticalMatchCount = 0;

                    recipe.requiredIngredients.forEach(reqIng => {
                        const isAvailable = availableNames.some(name => name.includes(reqIng));
                        if (isAvailable) {
                            matchCount++;
                            const isCritical = criticalIngredients.some(name => name.includes(reqIng));
                            if (isCritical) criticalMatchCount++;
                        }
                    });

                    const matchScore = matchCount / recipe.requiredIngredients.length;
                    return { recipe, matchScore, criticalMatchCount };
                });

                return matched
                    .filter(m => m.matchScore >= 0.4) 
                    .sort((a, b) => {
                        if (b.criticalMatchCount !== a.criticalMatchCount) {
                            return b.criticalMatchCount - a.criticalMatchCount;
                        }
                        return b.matchScore - a.matchScore;
